AlertSeverity:
  type: string
  enum:
  - ALERT_SEVERITY_UNSPECIFIED
  - ALERT_SEVERITY_INFO
  - ALERT_SEVERITY_WARNING
  - ALERT_SEVERITY_ERROR
  - ALERT_SEVERITY_CRITICAL
  description: 'Enumeration of alert severity values. Valid options: ALERT_SEVERITY_UNSPECIFIED,
    ALERT_SEVERITY_INFO, ALERT_SEVERITY_WARNING, ALERT_SEVERITY_ERROR, ALERT_SEVERITY_CRITICAL.'
