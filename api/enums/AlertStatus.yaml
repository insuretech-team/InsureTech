AlertStatus:
  type: string
  enum:
  - ALERT_STATUS_UNSPECIFIED
  - ALERT_STATUS_OPEN
  - ALERT_STATUS_INVESTIGATING
  - ALERT_STATUS_CONFIRMED
  - ALERT_STATUS_FALSE_POSITIVE
  - ALERT_STATUS_CLOSED
  description: 'Status values for alert. Defines lifecycle states: ALERT_STATUS_UNSPECIFIED,
    ALERT_STATUS_OPEN, ALERT_STATUS_INVESTIGATING, ALERT_STATUS_CONFIRMED, ALERT_STATUS_FALSE_POSITIVE
    (and 1 more).'
