ApiKeyStatus:
  type: string
  enum:
  - API_KEY_STATUS_UNSPECIFIED
  - API_KEY_STATUS_ACTIVE
  - API_KEY_STATUS_EXPIRED
  - API_KEY_STATUS_REVOKED
  - API_KEY_STATUS_SUSPENDED
  - API_KEY_STATUS_ROTATING
  description: 'Status values for api key. Defines lifecycle states: API_KEY_STATUS_UNSPECIFIED,
    API_KEY_STATUS_ACTIVE, API_KEY_STATUS_EXPIRED, API_KEY_STATUS_REVOKED, API_KEY_STATUS_SUSPENDED
    (and 1 more).'
