ClaimStatus:
  type: string
  enum:
  - CLAIM_STATUS_UNSPECIFIED
  - CLAIM_STATUS_SUBMITTED
  - CLAIM_STATUS_UNDER_REVIEW
  - CLAIM_STATUS_PENDING_DOCUMENTS
  - CLAIM_STATUS_APPROVED
  - CLAIM_STATUS_REJECTED
  - CLAIM_STATUS_SETTLED
  - CLAIM_STATUS_DISPUTED
  description: 'Status values for claim. Defines lifecycle states: CLAIM_STATUS_UNSPECIFIED,
    CLAIM_STATUS_SUBMITTED, CLAIM_STATUS_UNDER_REVIEW, CLAIM_STATUS_PENDING_DOCUMENTS,
    CLAIM_STATUS_APPROVED (and 3 more).'
