DeviceStatus:
  type: string
  enum:
  - DEVICE_STATUS_UNSPECIFIED
  - DEVICE_STATUS_PENDING_ACTIVATION
  - DEVICE_STATUS_ACTIVE
  - DEVICE_STATUS_INACTIVE
  - DEVICE_STATUS_OFFLINE
  - DEVICE_STATUS_DECOMMISSIONED
  description: 'Status values for device. Defines lifecycle states: DEVICE_STATUS_UNSPECIFIED,
    DEVICE_STATUS_PENDING_ACTIVATION, DEVICE_STATUS_ACTIVE, DEVICE_STATUS_INACTIVE,
    DEVICE_STATUS_OFFLINE (and 1 more).'
