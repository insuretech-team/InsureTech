EndorsementStatus:
  type: string
  enum:
  - ENDORSEMENT_STATUS_UNSPECIFIED
  - ENDORSEMENT_STATUS_PENDING
  - ENDORSEMENT_STATUS_APPROVED
  - ENDORSEMENT_STATUS_REJECTED
  - ENDORSEMENT_STATUS_APPLIED
  - ENDORSEMENT_STATUS_CANCELLED
  description: 'Status values for endorsement. Defines lifecycle states: ENDORSEMENT_STATUS_UNSPECIFIED,
    ENDORSEMENT_STATUS_PENDING, ENDORSEMENT_STATUS_APPROVED, ENDORSEMENT_STATUS_REJECTED,
    ENDORSEMENT_STATUS_APPLIED (and 1 more).'
