EventSeverity:
  type: string
  enum:
  - EVENT_SEVERITY_UNSPECIFIED
  - EVENT_SEVERITY_INFO
  - EVENT_SEVERITY_WARNING
  - EVENT_SEVERITY_ERROR
  - EVENT_SEVERITY_CRITICAL
  description: 'Enumeration of event severity values. Valid options: EVENT_SEVERITY_UNSPECIFIED,
    EVENT_SEVERITY_INFO, EVENT_SEVERITY_WARNING, EVENT_SEVERITY_ERROR, EVENT_SEVERITY_CRITICAL.'
