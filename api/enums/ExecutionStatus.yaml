ExecutionStatus:
  type: string
  enum:
  - EXECUTION_STATUS_UNSPECIFIED
  - EXECUTION_STATUS_PENDING
  - EXECUTION_STATUS_RUNNING
  - EXECUTION_STATUS_COMPLETED
  - EXECUTION_STATUS_FAILED
  description: 'Status values for execution. Defines lifecycle states: EXECUTION_STATUS_UNSPECIFIED,
    EXECUTION_STATUS_PENDING, EXECUTION_STATUS_RUNNING, EXECUTION_STATUS_COMPLETED,
    EXECUTION_STATUS_FAILED.'
