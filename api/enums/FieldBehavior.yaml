FieldBehavior:
  type: string
  enum:
  - FIELD_BEHAVIOR_UNSPECIFIED
  - OPTIONAL
  - REQUIRED
  - OUTPUT_ONLY
  - INPUT_ONLY
  - IMMUTABLE
  - UNORDERED_LIST
  - NON_EMPTY_DEFAULT
  - IDENTIFIER
  description: "An indicator of the behavior of a given field (for example, that a\
    \ field\n is required in requests, or given as output but ignored as input).\n\
    \ This **does not** change the behavior in protocol buffers itself; it only\n\
    \ denotes the behavior and may affect how API tooling handles the field.\n\n Note:\
    \ This enum **may** receive new values in the future."
