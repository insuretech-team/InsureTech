InstanceStatus:
  type: string
  enum:
  - INSTANCE_STATUS_UNSPECIFIED
  - INSTANCE_STATUS_PENDING
  - INSTANCE_STATUS_IN_PROGRESS
  - INSTANCE_STATUS_COMPLETED
  - INSTANCE_STATUS_FAILED
