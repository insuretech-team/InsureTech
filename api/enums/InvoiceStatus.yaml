InvoiceStatus:
  type: string
  enum:
  - INVOICE_STATUS_UNSPECIFIED
  - INVOICE_STATUS_DRAFT
  - INVOICE_STATUS_ISSUED
  - INVOICE_STATUS_PENDING
  - INVOICE_STATUS_APPROVED
  - INVOICE_STATUS_PAID
  - INVOICE_STATUS_OVERDUE
  - INVOICE_STATUS_CANCELLED
  - INVOICE_STATUS_CREDIT_NOTE_ISSUED
  description: 'Status values for invoice. Defines lifecycle states: INVOICE_STATUS_UNSPECIFIED,
    INVOICE_STATUS_DRAFT, INVOICE_STATUS_ISSUED, INVOICE_STATUS_PENDING, INVOICE_STATUS_APPROVED
    (and 4 more).'
