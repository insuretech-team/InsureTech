KYCStatus:
  type: string
  enum:
  - KYC_STATUS_UNSPECIFIED
  - KYC_STATUS_NOT_STARTED
  - KYC_STATUS_IN_PROGRESS
  - KYC_STATUS_COMPLETED
  - KYC_STATUS_FAILED
  - KYC_STATUS_EXPIRED
  - KYC_STATUS_REJECTED
  description: 'Status values for kyc. Defines lifecycle states: KYC_STATUS_UNSPECIFIED,
    KYC_STATUS_NOT_STARTED, KYC_STATUS_IN_PROGRESS, KYC_STATUS_COMPLETED, KYC_STATUS_FAILED
    (and 2 more).'
