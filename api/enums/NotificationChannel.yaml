NotificationChannel:
  type: string
  enum:
  - NOTIFICATION_CHANNEL_UNSPECIFIED
  - NOTIFICATION_CHANNEL_SMS
  - NOTIFICATION_CHANNEL_EMAIL
  - NOTIFICATION_CHANNEL_PUSH
  - NOTIFICATION_CHANNEL_WHATSAPP
  - NOTIFICATION_CHANNEL_IN_APP
  description: 'Enumeration of notification channel values. Valid options: NOTIFICATION_CHANNEL_UNSPECIFIED,
    NOTIFICATION_CHANNEL_SMS, NOTIFICATION_CHANNEL_EMAIL, NOTIFICATION_CHANNEL_PUSH,
    NOTIFICATION_CHANNEL_WHATSAPP (and 1 more).'
