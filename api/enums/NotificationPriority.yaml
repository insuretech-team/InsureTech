NotificationPriority:
  type: string
  enum:
  - NOTIFICATION_PRIORITY_UNSPECIFIED
  - NOTIFICATION_PRIORITY_LOW
  - NOTIFICATION_PRIORITY_NORMAL
  - NOTIFICATION_PRIORITY_HIGH
