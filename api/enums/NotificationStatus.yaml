NotificationStatus:
  type: string
  enum:
  - NOTIFICATION_STATUS_UNSPECIFIED
  - NOTIFICATION_STATUS_QUEUED
  - NOTIFICATION_STATUS_SENDING
  - NOTIFICATION_STATUS_SENT
  - NOTIFICATION_STATUS_DELIVERED
  - NOTIFICATION_STATUS_READ
  - NOTIFICATION_STATUS_FAILED
  - NOTIFICATION_STATUS_BOUNCED
  description: 'Status values for notification. Defines lifecycle states: NOTIFICATION_STATUS_UNSPECIFIED,
    NOTIFICATION_STATUS_QUEUED, NOTIFICATION_STATUS_SENDING, NOTIFICATION_STATUS_SENT,
    NOTIFICATION_STATUS_DELIVERED (and 3 more).'
