NotificationType:
  type: string
  enum:
  - NOTIFICATION_TYPE_UNSPECIFIED
  - NOTIFICATION_TYPE_OTP
  - NOTIFICATION_TYPE_POLICY_ISSUED
  - NOTIFICATION_TYPE_PAYMENT_CONFIRMATION
  - NOTIFICATION_TYPE_CLAIM_SUBMITTED
  - NOTIFICATION_TYPE_CLAIM_APPROVED
  - NOTIFICATION_TYPE_CLAIM_REJECTED
  - NOTIFICATION_TYPE_RENEWAL_REMINDER
  - NOTIFICATION_TYPE_GRACE_PERIOD
  - NOTIFICATION_TYPE_POLICY_LAPSED
  - NOTIFICATION_TYPE_MARKETING
  description: 'Type categorization for notification. Options: NOTIFICATION_TYPE_UNSPECIFIED,
    NOTIFICATION_TYPE_OTP, NOTIFICATION_TYPE_POLICY_ISSUED, NOTIFICATION_TYPE_PAYMENT_CONFIRMATION,
    NOTIFICATION_TYPE_CLAIM_SUBMITTED (and 6 more).'
