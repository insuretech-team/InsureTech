PartitionStrategy:
  type: string
  enum:
  - PARTITION_STRATEGY_UNSPECIFIED
  - PARTITION_STRATEGY_NONE
  - PARTITION_STRATEGY_RANGE_YEAR
  - PARTITION_STRATEGY_RANGE_MONTH
  - PARTITION_STRATEGY_LIST
  - PARTITION_STRATEGY_HASH
  description: 'Enumeration of partition strategy values. Valid options: PARTITION_STRATEGY_UNSPECIFIED,
    PARTITION_STRATEGY_NONE, PARTITION_STRATEGY_RANGE_YEAR, PARTITION_STRATEGY_RANGE_MONTH,
    PARTITION_STRATEGY_LIST (and 1 more).'
