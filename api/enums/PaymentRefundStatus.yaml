PaymentRefundStatus:
  type: string
  enum:
  - PAYMENT_REFUND_STATUS_UNSPECIFIED
  - PAYMENT_REFUND_STATUS_PENDING
  - PAYMENT_REFUND_STATUS_APPROVED
  - PAYMENT_REFUND_STATUS_PROCESSING
  - PAYMENT_REFUND_STATUS_COMPLETED
  - PAYMENT_REFUND_STATUS_REJECTED
  - PAYMENT_REFUND_STATUS_FAILED
  description: 'Status values for payment refund. Defines lifecycle states: PAYMENT_REFUND_STATUS_UNSPECIFIED,
    PAYMENT_REFUND_STATUS_PENDING, PAYMENT_REFUND_STATUS_APPROVED, PAYMENT_REFUND_STATUS_PROCESSING,
    PAYMENT_REFUND_STATUS_COMPLETED (and 2 more).'
