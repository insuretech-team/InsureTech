PayoutStatus:
  type: string
  enum:
  - PAYOUT_STATUS_UNSPECIFIED
  - PAYOUT_STATUS_PENDING
  - PAYOUT_STATUS_APPROVED
  - PAYOUT_STATUS_PROCESSING
  - PAYOUT_STATUS_PAID
  - PAYOUT_STATUS_FAILED
  - PAYOUT_STATUS_CANCELLED
  description: 'Status values for payout. Defines lifecycle states: PAYOUT_STATUS_UNSPECIFIED,
    PAYOUT_STATUS_PENDING, PAYOUT_STATUS_APPROVED, PAYOUT_STATUS_PROCESSING, PAYOUT_STATUS_PAID
    (and 2 more).'
