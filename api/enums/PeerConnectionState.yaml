PeerConnectionState:
  type: string
  enum:
  - PEER_CONNECTION_STATE_UNSPECIFIED
  - PEER_CONNECTION_STATE_NEW
  - PEER_CONNECTION_STATE_CONNECTING
  - PEER_CONNECTION_STATE_CONNECTED
  - PEER_CONNECTION_STATE_DISCONNECTED
  - PEER_CONNECTION_STATE_FAILED
  - PEER_CONNECTION_STATE_CLOSED
  description: 'Enumeration of peer connection state values. Valid options: PEER_CONNECTION_STATE_UNSPECIFIED,
    PEER_CONNECTION_STATE_NEW, PEER_CONNECTION_STATE_CONNECTING, PEER_CONNECTION_STATE_CONNECTED,
    PEER_CONNECTION_STATE_DISCONNECTED (and 2 more).'
