PolicyStatus:
  type: string
  enum:
  - POLICY_STATUS_UNSPECIFIED
  - POLICY_STATUS_PENDING_PAYMENT
  - POLICY_STATUS_ACTIVE
  - POLICY_STATUS_GRACE_PERIOD
  - POLICY_STATUS_LAPSED
  - POLICY_STATUS_SUSPENDED
  - POLICY_STATUS_CANCELLED
  - POLICY_STATUS_EXPIRED
  description: 'Status values for policy. Defines lifecycle states: POLICY_STATUS_UNSPECIFIED,
    POLICY_STATUS_PENDING_PAYMENT, POLICY_STATUS_ACTIVE, POLICY_STATUS_GRACE_PERIOD,
    POLICY_STATUS_LAPSED (and 3 more).'
