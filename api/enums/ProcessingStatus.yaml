ProcessingStatus:
  type: string
  enum:
  - PROCESSING_STATUS_UNSPECIFIED
  - PROCESSING_STATUS_PENDING
  - PROCESSING_STATUS_IN_PROGRESS
  - PROCESSING_STATUS_COMPLETED
  - PROCESSING_STATUS_FAILED
  - PROCESSING_STATUS_CANCELLED
  description: 'Status values for processing. Defines lifecycle states: PROCESSING_STATUS_UNSPECIFIED,
    PROCESSING_STATUS_PENDING, PROCESSING_STATUS_IN_PROGRESS, PROCESSING_STATUS_COMPLETED,
    PROCESSING_STATUS_FAILED (and 1 more).'
