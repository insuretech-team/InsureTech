PurchaseOrderStatus:
  type: string
  enum:
  - PURCHASE_ORDER_STATUS_UNSPECIFIED
  - PURCHASE_ORDER_STATUS_DRAFT
  - PURCHASE_ORDER_STATUS_SUBMITTED
  - PURCHASE_ORDER_STATUS_APPROVED
  - PURCHASE_ORDER_STATUS_FULFILLED
  - PURCHASE_ORDER_STATUS_REJECTED
  description: 'Status values for purchase order. Defines lifecycle states: PURCHASE_ORDER_STATUS_UNSPECIFIED,
    PURCHASE_ORDER_STATUS_DRAFT, PURCHASE_ORDER_STATUS_SUBMITTED, PURCHASE_ORDER_STATUS_APPROVED,
    PURCHASE_ORDER_STATUS_FULFILLED (and 1 more).'
