QuotationStatus:
  type: string
  enum:
  - QUOTATION_STATUS_UNSPECIFIED
  - QUOTATION_STATUS_DRAFT
  - QUOTATION_STATUS_SUBMITTED
  - QUOTATION_STATUS_RECEIVED
  - QUOTATION_STATUS_APPROVED
  - QUOTATION_STATUS_REJECTED
  description: 'Status values for quotation. Defines lifecycle states: QUOTATION_STATUS_UNSPECIFIED,
    QUOTATION_STATUS_DRAFT, QUOTATION_STATUS_SUBMITTED, QUOTATION_STATUS_RECEIVED,
    QUOTATION_STATUS_APPROVED (and 1 more).'
