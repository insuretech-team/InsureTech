QuoteStatus:
  type: string
  enum:
  - QUOTE_STATUS_UNSPECIFIED
  - QUOTE_STATUS_DRAFT
  - QUOTE_STATUS_PENDING_UNDERWRITING
  - QUOTE_STATUS_APPROVED
  - QUOTE_STATUS_REJECTED
  - QUOTE_STATUS_EXPIRED
  - QUOTE_STATUS_CONVERTED
  description: 'Status values for quote. Defines lifecycle states: QUOTE_STATUS_UNSPECIFIED,
    QUOTE_STATUS_DRAFT, QUOTE_STATUS_PENDING_UNDERWRITING, QUOTE_STATUS_APPROVED,
    QUOTE_STATUS_REJECTED (and 2 more).'
