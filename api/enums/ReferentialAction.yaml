ReferentialAction:
  type: string
  enum:
  - REFERENTIAL_ACTION_UNSPECIFIED
  - REFERENTIAL_ACTION_NO_ACTION
  - REFERENTIAL_ACTION_RESTRICT
  - REFERENTIAL_ACTION_CASCADE
  - REFERENTIAL_ACTION_SET_NULL
  - REFERENTIAL_ACTION_SET_DEFAULT
  description: 'Available actions for referential. Actions: REFERENTIAL_ACTION_UNSPECIFIED,
    REFERENTIAL_ACTION_NO_ACTION, REFERENTIAL_ACTION_RESTRICT, REFERENTIAL_ACTION_CASCADE,
    REFERENTIAL_ACTION_SET_NULL (and 1 more).'
