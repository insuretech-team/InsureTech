RefundStatus:
  type: string
  enum:
  - REFUND_STATUS_UNSPECIFIED
  - REFUND_STATUS_PENDING
  - REFUND_STATUS_CALCULATING
  - REFUND_STATUS_APPROVED
  - REFUND_STATUS_PROCESSING
  - REFUND_STATUS_COMPLETED
  - REFUND_STATUS_FAILED
  - REFUND_STATUS_REJECTED
  description: 'Status values for refund. Defines lifecycle states: REFUND_STATUS_UNSPECIFIED,
    REFUND_STATUS_PENDING, REFUND_STATUS_CALCULATING, REFUND_STATUS_APPROVED, REFUND_STATUS_PROCESSING
    (and 3 more).'
