RenewalStatus:
  type: string
  enum:
  - RENEWAL_STATUS_UNSPECIFIED
  - RENEWAL_STATUS_PENDING
  - RENEWAL_STATUS_REMINDED
  - RENEWAL_STATUS_IN_GRACE_PERIOD
  - RENEWAL_STATUS_RENEWED
  - RENEWAL_STATUS_LAPSED
  - RENEWAL_STATUS_CANCELLED
  description: 'Status values for renewal. Defines lifecycle states: RENEWAL_STATUS_UNSPECIFIED,
    RENEWAL_STATUS_PENDING, RENEWAL_STATUS_REMINDED, RENEWAL_STATUS_IN_GRACE_PERIOD,
    RENEWAL_STATUS_RENEWED (and 2 more).'
