ScheduleFrequency:
  type: string
  enum:
  - SCHEDULE_FREQUENCY_UNSPECIFIED
  - SCHEDULE_FREQUENCY_HOURLY
  - SCHEDULE_FREQUENCY_DAILY
  - SCHEDULE_FREQUENCY_WEEKLY
  - SCHEDULE_FREQUENCY_MONTHLY
  - SCHEDULE_FREQUENCY_CUSTOM
  description: 'Enumeration of schedule frequency values. Valid options: SCHEDULE_FREQUENCY_UNSPECIFIED,
    SCHEDULE_FREQUENCY_HOURLY, SCHEDULE_FREQUENCY_DAILY, SCHEDULE_FREQUENCY_WEEKLY,
    SCHEDULE_FREQUENCY_MONTHLY (and 1 more).'
