TicketStatus:
  type: string
  enum:
  - TICKET_STATUS_UNSPECIFIED
  - TICKET_STATUS_OPEN
  - TICKET_STATUS_IN_PROGRESS
  - TICKET_STATUS_WAITING_CUSTOMER
  - TICKET_STATUS_RESOLVED
  - TICKET_STATUS_CLOSED
  - TICKET_STATUS_CANCELLED
  description: 'Status values for ticket. Defines lifecycle states: TICKET_STATUS_UNSPECIFIED,
    TICKET_STATUS_OPEN, TICKET_STATUS_IN_PROGRESS, TICKET_STATUS_WAITING_CUSTOMER,
    TICKET_STATUS_RESOLVED (and 2 more).'
