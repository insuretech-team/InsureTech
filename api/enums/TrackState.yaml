TrackState:
  type: string
  enum:
  - TRACK_STATE_UNSPECIFIED
  - TRACK_STATE_ACTIVE
  - TRACK_STATE_INACTIVE
  - TRACK_STATE_ENDED
  - TRACK_STATE_PAUSED
  description: 'Enumeration of track state values. Valid options: TRACK_STATE_UNSPECIFIED,
    TRACK_STATE_ACTIVE, TRACK_STATE_INACTIVE, TRACK_STATE_ENDED, TRACK_STATE_PAUSED.'
