TransactionStatus:
  type: string
  enum:
  - TRANSACTION_STATUS_UNSPECIFIED
  - TRANSACTION_STATUS_PENDING
  - TRANSACTION_STATUS_PROCESSING
  - TRANSACTION_STATUS_COMPLETED
  - TRANSACTION_STATUS_FAILED
  - TRANSACTION_STATUS_CANCELLED
  description: 'Status values for transaction. Defines lifecycle states: TRANSACTION_STATUS_UNSPECIFIED,
    TRANSACTION_STATUS_PENDING, TRANSACTION_STATUS_PROCESSING, TRANSACTION_STATUS_COMPLETED,
    TRANSACTION_STATUS_FAILED (and 1 more).'
