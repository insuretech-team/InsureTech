VerificationStatus:
  type: string
  enum:
  - VERIFICATION_STATUS_UNSPECIFIED
  - VERIFICATION_STATUS_PENDING
  - VERIFICATION_STATUS_IN_PROGRESS
  - VERIFICATION_STATUS_VERIFIED
  - VERIFICATION_STATUS_REJECTED
  - VERIFICATION_STATUS_EXPIRED
  description: 'Status values for verification. Defines lifecycle states: VERIFICATION_STATUS_UNSPECIFIED,
    VERIFICATION_STATUS_PENDING, VERIFICATION_STATUS_IN_PROGRESS, VERIFICATION_STATUS_VERIFIED,
    VERIFICATION_STATUS_REJECTED (and 1 more).'
