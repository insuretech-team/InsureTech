WebrtcErrorCode:
  type: string
  enum:
  - ERROR_CODE_UNSPECIFIED
  - ERROR_CODE_ROOM_NOT_FOUND
  - ERROR_CODE_ROOM_FULL
  - ERROR_CODE_INVALID_TOKEN
  - ERROR_CODE_PEER_NOT_FOUND
  - ERROR_CODE_CONNECTION_FAILED
  - ERROR_CODE_INVALID_SDP
  - ERROR_CODE_MEDIA_ERROR
  - ERROR_CODE_PERMISSION_DENIED
  - ERROR_CODE_INTERNAL_ERROR
  description: 'Enumeration of error code values. Valid options: ERROR_CODE_UNSPECIFIED,
    ERROR_CODE_ROOM_NOT_FOUND, ERROR_CODE_ROOM_FULL, ERROR_CODE_INVALID_TOKEN, ERROR_CODE_PEER_NOT_FOUND
    (and 5 more).'
