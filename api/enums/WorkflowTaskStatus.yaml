WorkflowTaskStatus:
  type: string
  enum:
  - TASK_STATUS_UNSPECIFIED
  - TASK_STATUS_PENDING
  - TASK_STATUS_IN_PROGRESS
  - TASK_STATUS_COMPLETED
  - TASK_STATUS_SKIPPED
  description: 'Status values for task. Defines lifecycle states: TASK_STATUS_UNSPECIFIED,
    TASK_STATUS_PENDING, TASK_STATUS_IN_PROGRESS, TASK_STATUS_COMPLETED, TASK_STATUS_SKIPPED.'
