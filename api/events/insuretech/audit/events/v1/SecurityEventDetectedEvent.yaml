SecurityEventDetectedEvent:
  type: object
  properties:
    event_id:
      type: string
    audit_event_id:
      type: string
    event_type:
      type: string
    severity:
      type: string
    user_id:
      type: string
    ip_address:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Security event detected'
