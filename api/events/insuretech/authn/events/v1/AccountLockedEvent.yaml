AccountLockedEvent:
  type: object
  properties:
    event_id:
      type: string
    user_id:
      type: string
    reason:
      type: string
      description: '"failed_login" | "fraud" | "manual"'
    timestamp:
      type: string
      format: date-time
    locked_until:
      type: string
      format: date-time
  description: 'Event: Account locked'
