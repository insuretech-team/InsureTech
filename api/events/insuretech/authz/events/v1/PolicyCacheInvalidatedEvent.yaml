PolicyCacheInvalidatedEvent:
  type: object
  properties:
    event_id:
      type: string
    domain:
      type: string
      description: empty = global invalidation
    reason:
      type: string
    occurred_at:
      type: string
      format: date-time
  description: Event emitted when policy cache undergoes invalidated. Published to
    event stream for downstream processing and audit trail.
