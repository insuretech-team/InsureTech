OrgMemberAddedEvent:
  type: object
  properties:
    event_id:
      type: string
    member_id:
      type: string
    organisation_id:
      type: string
    user_id:
      type: string
    role:
      $ref: '#/components/schemas/OrgMemberRole'
    added_by:
      type: string
      description: SuperAdmin or BizAdmin user_id
    timestamp:
      type: string
      format: date-time
  description: OrgMemberAddedEvent is published when a user is added to an organisation
