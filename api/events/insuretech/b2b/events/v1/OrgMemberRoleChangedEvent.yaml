OrgMemberRoleChangedEvent:
  type: object
  properties:
    event_id:
      type: string
    member_id:
      type: string
    organisation_id:
      type: string
    user_id:
      type: string
    old_role:
      $ref: '#/components/schemas/OrgMemberRole'
    new_role:
      $ref: '#/components/schemas/OrgMemberRole'
    changed_by:
      type: string
    timestamp:
      type: string
      format: date-time
  description: OrgMemberRoleChangedEvent is published when a member's role changes
