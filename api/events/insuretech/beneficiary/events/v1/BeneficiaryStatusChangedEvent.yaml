BeneficiaryStatusChangedEvent:
  type: object
  properties:
    event_id:
      type: string
    beneficiary_id:
      type: string
    old_status:
      type: string
    new_status:
      type: string
    reason:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Status changed'
