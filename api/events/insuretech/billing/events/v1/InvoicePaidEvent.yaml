InvoicePaidEvent:
  type: object
  properties:
    event_id:
      type: string
    invoice_id:
      type: string
    invoice_number:
      type: string
    order_id:
      type: string
    payment_id:
      type: string
    customer_id:
      type: string
    organisation_id:
      type: string
    tenant_id:
      type: string
    total_amount:
      $ref: '#/components/schemas/Money'
    correlation_id:
      type: string
    causation_id:
      type: string
    paid_at:
      type: string
      format: date-time
    occurred_at:
      type: string
      format: date-time
  description: "Event: Invoice paid \u2014 published when payment is confirmed and\
    \ invoice marked PAID"
