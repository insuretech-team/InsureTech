ClaimSubmittedEvent:
  type: object
  properties:
    event_id:
      type: string
    claim_id:
      type: string
    claim_number:
      type: string
    policy_id:
      type: string
    customer_id:
      type: string
    claimed_amount:
      $ref: '#/components/schemas/Money'
    claim_type:
      type: string
    timestamp:
      type: string
      format: date-time
    correlation_id:
      type: string
      description: 'CG-6: trace across services'
  description: 'Event: Claim submitted'
