RevenueShareRecordedEvent:
  type: object
  properties:
    event_id:
      type: string
    revenue_share_id:
      type: string
    policy_id:
      type: string
    insurer_id:
      type: string
    platform_share:
      $ref: '#/components/schemas/Money'
    insurer_share:
      $ref: '#/components/schemas/Money'
    revenue_model:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Revenue share recorded'
