MediaValidationCompletedEvent:
  type: object
  properties:
    event_id:
      type: string
    media_id:
      type: string
    validation_status:
      type: string
      description: VALIDATED, REJECTED
    validation_errors:
      type: array
      items:
        type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Media validation completed'
