OrderPaymentInitiatedEvent:
  type: object
  properties:
    event_id:
      type: string
    order_id:
      type: string
    payment_id:
      type: string
    payment_gateway_ref:
      type: string
    amount:
      $ref: '#/components/schemas/Money'
    payment_method:
      type: string
    timestamp:
      type: string
      format: date-time
    correlation_id:
      type: string
    tenant_id:
      type: string
      description: Extended context fields (Phase 2)
    organisation_id:
      type: string
    portal:
      type: string
    actor_user_id:
      type: string
    session_id:
      type: string
    causation_id:
      type: string
    idempotency_key:
      type: string
    occurred_at:
      type: string
      format: date-time
  description: 'Event: Payment initiated for an order'
