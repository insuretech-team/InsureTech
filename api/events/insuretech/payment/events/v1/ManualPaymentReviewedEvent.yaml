ManualPaymentReviewedEvent:
  type: object
  properties:
    event_id:
      type: string
    payment_id:
      type: string
    order_id:
      type: string
    approved:
      type: boolean
    reviewed_by:
      type: string
      description: admin/agent user_id
    review_notes:
      type: string
    rejection_reason:
      type: string
      description: populated when approved=false
    tenant_id:
      type: string
    organisation_id:
      type: string
    correlation_id:
      type: string
    causation_id:
      type: string
    occurred_at:
      type: string
      format: date-time
  description: 'Event: Admin approved or rejected a manual payment proof'
