        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
        \u2500\u2500\u2500"
    invoice_id:
      type: string
    tenant_id:
      type: string
    organisation_id:
      type: string
    portal:
      type: string
    actor_user_id:
      type: string
    session_id:
      type: string
    causation_id:
      type: string
    provider:
      type: string
