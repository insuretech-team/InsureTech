PaymentReconciliationMismatchEvent:
  type: object
  properties:
    event_id:
      type: string
    payment_id:
      type: string
    order_id:
      type: string
    expected_amount:
      type: string
      description: Internal amount (paisa as string)
    actual_amount:
      type: string
      description: Provider-reported amount (paisa as string)
    provider:
      type: string
    gateway_ref:
      type: string
      description: Provider's transaction reference
    tenant_id:
      type: string
    reconciliation_id:
      type: string
      description: Batch reconciliation run ID
    mismatch_reason:
      type: string
      description: Human-readable description of the mismatch
    occurred_at:
      type: string
      format: date-time
  description: 'Event: Reconciliation mismatch found between internal records and
    provider report'
