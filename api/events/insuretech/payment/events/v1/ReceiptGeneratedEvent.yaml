ReceiptGeneratedEvent:
  type: object
  properties:
    event_id:
      type: string
    payment_id:
      type: string
    order_id:
      type: string
    receipt_number:
      type: string
    receipt_file_id:
      type: string
      description: Media/storage service file ID
    receipt_document_id:
      type: string
      description: Document-service document ID
    tenant_id:
      type: string
    organisation_id:
      type: string
    correlation_id:
      type: string
    causation_id:
      type: string
    occurred_at:
      type: string
      format: date-time
  description: 'Event: Payment receipt PDF generated and stored'
