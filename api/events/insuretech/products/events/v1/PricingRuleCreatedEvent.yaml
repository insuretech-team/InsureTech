PricingRuleCreatedEvent:
  type: object
  properties:
    event_id:
      type: string
    pricing_config_id:
      type: string
    product_id:
      type: string
    rule_type:
      type: string
      description: AGE_BASED, LOCATION_BASED, etc.
    effective_from:
      type: string
      format: date-time
    effective_to:
      type: string
      format: date-time
    timestamp:
      type: string
      format: date-time
    created_by:
      type: string
  description: 'Event: Pricing rule created'
