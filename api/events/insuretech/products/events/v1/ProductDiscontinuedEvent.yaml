ProductDiscontinuedEvent:
  type: object
  properties:
    event_id:
      type: string
    product_id:
      type: string
    product_code:
      type: string
    reason:
      type: string
    timestamp:
      type: string
      format: date-time
    discontinued_by:
      type: string
  description: 'Event: Product discontinued (permanently)'
