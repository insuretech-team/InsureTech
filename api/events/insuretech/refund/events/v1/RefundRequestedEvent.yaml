RefundRequestedEvent:
  type: object
  properties:
    event_id:
      type: string
    refund_id:
      type: string
    refund_number:
      type: string
    policy_id:
      type: string
    reason:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Refund requested'
