ReportExecutionCompletedEvent:
  type: object
  properties:
    event_id:
      type: string
    report_execution_id:
      type: string
    file_url:
      type: string
    file_format:
      type: string
    row_count:
      type: integer
      format: int32
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Report execution completed'
