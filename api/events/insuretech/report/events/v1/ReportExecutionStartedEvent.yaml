ReportExecutionStartedEvent:
  type: object
  properties:
    event_id:
      type: string
    report_execution_id:
      type: string
    report_definition_id:
      type: string
    executed_by:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Report execution started'
