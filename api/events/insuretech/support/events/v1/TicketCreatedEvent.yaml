TicketCreatedEvent:
  type: object
  properties:
    event_id:
      type: string
    ticket_id:
      type: string
    ticket_number:
      type: string
    beneficiary_id:
      type: string
    type:
      type: string
    category:
      type: string
    priority:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Ticket created'
