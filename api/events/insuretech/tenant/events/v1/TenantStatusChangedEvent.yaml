TenantStatusChangedEvent:
  type: object
  properties:
    event_id:
      type: string
    tenant_id:
      type: string
    old_status:
      type: string
    new_status:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Tenant status changed'
