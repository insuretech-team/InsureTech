VoiceSessionStartedEvent:
  type: object
  properties:
    event_id:
      type: string
    voice_session_id:
      type: string
    session_id:
      type: string
    user_id:
      type: string
    language:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Voice session started'
