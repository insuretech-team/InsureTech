TrackStateChangedEvent:
  type: object
  properties:
    room_id:
      type: string
    peer_id:
      type: string
    track_id:
      type: string
    old_state:
      $ref: '#/components/schemas/TrackState'
    new_state:
      $ref: '#/components/schemas/TrackState'
    changed_at:
      type: string
      format: date-time
  description: Event emitted when track state undergoes changed. Published to event
    stream for downstream processing and audit trail.
