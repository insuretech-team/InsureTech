TrackUnpublishedEvent:
  type: object
  properties:
    room_id:
      type: string
    peer_id:
      type: string
    track_id:
      type: string
    unpublished_at:
      type: string
      format: date-time
  description: Event emitted when track undergoes unpublished. Published to event
    stream for downstream processing and audit trail.
