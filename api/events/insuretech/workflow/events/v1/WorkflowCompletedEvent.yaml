WorkflowCompletedEvent:
  type: object
  properties:
    event_id:
      type: string
    workflow_instance_id:
      type: string
    entity_type:
      type: string
    entity_id:
      type: string
    status:
      type: string
      description: COMPLETED, FAILED, CANCELLED
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Workflow completed'
