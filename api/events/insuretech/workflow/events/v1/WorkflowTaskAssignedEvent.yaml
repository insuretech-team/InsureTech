WorkflowTaskAssignedEvent:
  type: object
  properties:
    event_id:
      type: string
    task_id:
      type: string
    workflow_instance_id:
      type: string
    step_name:
      type: string
    assigned_to:
      type: string
    correlation_id:
      type: string
    timestamp:
      type: string
      format: date-time
  description: 'Kafka event: Workflow task assigned'
