    CasbinRule:
      type: object
      properties:
        id:
          type: string
          format: int64
          description: '@inject_tag: gorm:"primarykey;autoIncrement"'
        ptype:
          type: string
          description: "ptype: \"p\" = policy line, \"g\" = role-inheritance line\r\
            \n @inject_tag: gorm:\"size:10;uniqueIndex:unique_index\""
        v0:
          type: string
          description: "v0: subject  (p-line) | member (g-line)\r\n @inject_tag: gorm:\"\
            size:256;uniqueIndex:unique_index\""
        v1:
          type: string
          description: "v1: domain   (p-line: portal:tenant) | domain (g-line: portal:tenant)\r\
            \n @inject_tag: gorm:\"size:256;uniqueIndex:unique_index\""
        v2:
          type: string
          description: "v2: object   (p-line: svc:resource) | role (g-line: role:<name>)\r\
            \n @inject_tag: gorm:\"size:256;uniqueIndex:unique_index\""
        v3:
          type: string
          description: "v3: action   (p-line: HTTP verb / domain action)\r\n @inject_tag:\
            \ gorm:\"size:256;uniqueIndex:unique_index\""
        v4:
          type: string
          description: "v4: effect   (p-line: allow | deny)\r\n @inject_tag: gorm:\"\
            size:256;uniqueIndex:unique_index\""
        v5:
          type: string
          description: "v5: reserved for future ABAC conditions / attribute matchers\r\
            \n @inject_tag: gorm:\"size:256;uniqueIndex:unique_index\""
      description: "---------------------------------------------------------------------------\r\
        \n 1. CasbinRule \u2014 raw Casbin policy/grouping rows stored in PostgreSQL.\r\
        \n    Casbin gorm-adapter reads/writes this table directly.\r\n    p-type\
        \ rows: ptype=\"p\"  \u2192 policy line: sub, dom, obj, act, eft\r\n    g-type\
        \ rows: ptype=\"g\"  \u2192 role assignment: sub, dom, role\r\n ---------------------------------------------------------------------------"
    PolicyRule:
      type: object
      properties:
        policy_id:
          type: string
          x-primary-key: true
          x-database-default: gen_random_uuid()
        subject:
          type: string
          description: 'Subject: "role:<name>" or "user:<uuid>"'
        domain:
          type: string
          description: 'Domain: "portal:tenant_id"'
        object:
          type: string
          description: 'Object: "svc:<service>/<resource>"'
        action:
          type: string
          description: 'Action: HTTP verb or domain verb'
        effect:
          allOf:
          - $ref: '#/components/schemas/PolicyEffect'
          x-database-default: allow
        condition:
          type: string
          description: Optional ABAC condition expression (evaluated by custom matcher)
        description:
          type: string
        is_active:
          type: boolean
          default: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
          x-database-default: CURRENT_TIMESTAMP
        updated_at:
          type: string
          format: date-time
          x-database-default: CURRENT_TIMESTAMP
        deleted_at:
          type: string
          format: date-time
      description: "---------------------------------------------------------------------------\r\
        \n 4. PolicyRule \u2014 human-readable view of a Casbin policy line.\r\n \
        \   Writes sync to casbin_rules via the authz service.\r\n ---------------------------------------------------------------------------"
      required:
      - policy_id
      - subject
      - domain
      - object
      - action
      - effect
      - is_active
      - created_at
      - updated_at
