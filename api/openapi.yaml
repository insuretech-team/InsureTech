components:
  schemas:
    AIAgent:
      type: object
      properties:
        agent_id:
          type: string
          description: '@inject_tag: gorm:"primaryKey;column:agent_id;not null"'
          x-primary-key: true
          x-database-default: gen_random_uuid()
        agent_name:
          type: string
          description: '@inject_tag: gorm:"column:agent_name;not null"'
          x-unique: true
        type:
          $ref: '#/components/schemas/AgentType'
          description: '@inject_tag: gorm:"column:type;not null;serializer:proto_enum"'
        model_name:
          type: string
          description: '@inject_tag: gorm:"column:model_name;not null"'
        status:
          allOf:
          - $ref: '#/components/schemas/AiAgentStatus'
          x-database-default: IDLE
        capabilities:
          type: object
          additionalProperties:
            type: string
          description: Map field (key-value pairs)
        created_at:
          type: string
          format: date-time
          description: '@inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"'
          x-database-default: CURRENT_TIMESTAMP
        last_active_at:
          type: string
          format: date-time
          description: '@inject_tag: gorm:"column:last_active_at;serializer:proto_timestamp"'
        updated_at:
          type: string
          format: date-time
          description: '@inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"'
          x-database-default: CURRENT_TIMESTAMP
      description: "AIAgent represents an AI agent in the multi-agent system\n Maps\
        \ to 'ai_agents' table in ai_schema"
      required:
      - agent_id
      - agent_name
      - type
      - model_name
      - status
      - created_at
      - updated_at
    AIAnalysis:
      type: object
      properties:
        analysis_id:
          type: string
          description: UUID
        agent_id:
          type: string
        type:
          $ref: '#/components/schemas/AnalysisType'
        subject_id:
          type: string
          description: Policy, claim, or document ID
        confidence_score:
          type: number
          format: double
          description: 0-1
        result:
          type: string
          description: JSON result
        recommendations:
          type: array
          items:
            type: string
        analyzed_at:
          type: string
          format: date-time
      description: AI Prediction/Analysis result
    Conversation:
      type: object
      properties:
        conversation_id:
          type: string
          description: '@inject_tag: gorm:"primaryKey;column:conversation_id;not null"'
          x-primary-key: true
          x-database-default: gen_random_uuid()
        user_id:
          type: string
          description: '@inject_tag: gorm:"column:user_id;not null"'
        agent_id:
          type: string
          description: '@inject_tag: gorm:"column:agent_id;not null"'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
            description: '@inject_tag: gorm:"column:messages;not null;serializer:proto_enum"'
          description: '@inject_tag: gorm:"column:messages;not null;serializer:proto_enum"'
        status:
          allOf:
          - $ref: '#/components/schemas/ConversationStatus'
          x-database-default: ACTIVE
        started_at:
          type: string
          format: date-time
          description: '@inject_tag: gorm:"column:started_at;not null;serializer:proto_timestamp"'
          x-database-default: CURRENT_TIMESTAMP
        ended_at:
          type: string
          format: date-time
          description: '@inject_tag: gorm:"column:ended_at;serializer:proto_timestamp"'
        context:
          type: object
          additionalProperties:
            type: string
          description: Map field (key-value pairs)
      description: "Conversation with AI agent (for customer support, chatbots)\n\
        \ Maps to 'ai_conversations' table in ai_schema"
      required:
      - conversation_id
      - user_id
      - agent_id
      - status
      - started_at
    MCPServer:
      type: object
      properties:
        server_id:
          type: string
          description: UUID
        server_name:
          type: string
        endpoint:
          type: string
          description: URL or connection string
        capabilities:
          type: array
          items:
            type: string
            description: What tools this server provides
          description: What tools this server provides
        status:
          $ref: '#/components/schemas/ServerStatus'
        last_ping_at:
