/v1/commissions:
  post:
    summary: Calculate and record commission for policy
    operationId: CommissionService_CalculateCommission
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommissionCalculationResponse'
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: Calculate and record commission for policy
    parameters:
    - name: action
      in: query
      required: true
      schema:
        type: string
        enum:
        - calculate
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommissionCalculationRequest'
      required: true
  get:
    summary: List commissions for recipient
    operationId: CommissionService_ListCommissions
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommissionsListingResponse'
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: List commissions for recipient
