/v1/mfs/payments:
  post:
    summary: Initiate payment
    operationId: MFSService_InitiatePayment
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfsInitiatePaymentResponse'
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: Initiate payment
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MfsInitiatePaymentRequest'
      required: true
