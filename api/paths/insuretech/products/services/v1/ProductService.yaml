/v1/products:
  get:
    summary: List all active products
    operationId: ProductService_ListProducts
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductsProductsListingResponse'
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: List all active products
  post:
    summary: Create product (admin)
    operationId: ProductService_CreateProduct
    responses:
      '201':
        description: Resource created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductsProductCreationResponse'
        headers:
          Location:
            description: URL of the created resource
            schema:
              type: string
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: Create product (admin)
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductsProductCreationRequest'
      required: true
