/v1/policies/{policy_id}:
  post:
    summary: Renew policy manually
    operationId: RenewalService_RenewPolicy
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewalPolicyRenewalResponse'
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: Renew policy manually
    parameters:
    - name: policy_id
      in: path
      required: true
      schema:
        type: string
    - name: action
      in: query
      required: true
      schema:
        type: string
        enum:
        - renew
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RenewalPolicyRenewalRequest'
      required: true
