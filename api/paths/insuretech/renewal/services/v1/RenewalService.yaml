/v1/policies/{policy_id}/renewal-schedule:
  get:
    summary: Get renewal schedule
    operationId: RenewalService_GetRenewalSchedule
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewalRenewalScheduleRetrievalResponse'
      '400':
        description: Bad request - Invalid input parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '401':
        description: Unauthorized - Authentication required
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '403':
        description: Forbidden - Insufficient permissions
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '404':
        description: Not found - Resource does not exist
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      '500':
        description: Internal server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    description: Get renewal schedule
    parameters:
    - name: policy_id
      in: path
      required: true
      schema:
        type: string
