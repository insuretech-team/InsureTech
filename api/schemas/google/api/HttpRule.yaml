HttpRule:
  type: object
  properties:
    selector:
      type: string
      description: "Selects a method to which this rule applies.\n\n Refer to [selector][google.api.DocumentationRule.selector]\
        \ for syntax\n details."
    get:
      type: string
      description: "Maps to HTTP GET. Used for listing and getting information about\n\
        \ resources."
    put:
      type: string
      description: Maps to HTTP PUT. Used for replacing a resource.
    post:
      type: string
      description: Maps to HTTP POST. Used for creating a resource or performing an
        action.
    delete:
      type: string
      description: Maps to HTTP DELETE. Used for deleting a resource.
    patch:
      type: string
      description: Maps to HTTP PATCH. Used for updating a resource.
    custom:
      $ref: '#/components/schemas/CustomHttpPattern'
      description: "The custom pattern is used for specifying an HTTP method that\
        \ is not\n included in the `pattern` field, such as HEAD, or \"*\" to leave\
        \ the\n HTTP method unspecified for this rule. The wild-card rule is useful\n\
        \ for services that provide content to Web (HTML) clients."
    body:
      type: string
      description: "The name of the request field whose value is mapped to the HTTP\
        \ request\n body, or `*` for mapping all request fields not captured by the\
        \ path\n pattern to the HTTP body, or omitted for not having any HTTP request\
        \ body.\n\n NOTE: the referred field must be present at the top-level of the\
        \ request\n message type."
    response_body:
      type: string
      description: "Optional. The name of the response field whose value is mapped\
        \ to the HTTP\n response body. When omitted, the entire response message will\
        \ be used\n as the HTTP response body.\n\n NOTE: The referred field must be\
        \ present at the top-level of the response\n message type."
    additional_bindings:
      type: array
      items:
        $ref: '#/components/schemas/HttpRule'
        description: "Additional HTTP bindings for the selector. Nested bindings must\n\
          \ not contain an `additional_bindings` field themselves (that is,\n the\
          \ nesting may only be one level deep)."
      description: "Additional HTTP bindings for the selector. Nested bindings must\n\
        \ not contain an `additional_bindings` field themselves (that is,\n the nesting\
        \ may only be one level deep)."
  description: "gRPC Transcoding\n\n gRPC Transcoding is a feature for mapping between\
    \ a gRPC method and one or\n more HTTP REST endpoints. It allows developers to\
    \ build a single API service\n that supports both gRPC APIs and REST APIs. Many\
    \ systems, including [Google\n APIs](https://github.com/googleapis/googleapis),\n\
    \ [Cloud Endpoints](https://cloud.google.com/endpoints), [gRPC\n Gateway](https://github.com/grpc-ecosystem/grpc-gateway),\n\
    \ and [Envoy](https://github.com/envoyproxy/envoy) proxy support this feature\n\
    \ and use it for large scale production services.\n\n `HttpRule` defines the schema\
    \ of the gRPC/REST mapping. The mapping specifies\n how different portions of\
    \ the gRPC request message are mapped to the URL\n path, URL query parameters,\
    \ and HTTP request body. It also controls how the\n gRPC response message is mapped\
    \ to the HTTP response body. `HttpRule` is\n typically specified as an `google.api.http`\
    \ annotation on the gRPC method.\n\n Each mapping specifies a URL path template\
    \ and an HTTP method. The path\n template may refer to one or more fields in the\
    \ gRPC request message, as long\n as each field is a non-repeated field with a\
    \ primitive (non-message) type.\n The path template controls how fields of the\
    \ request message are mapped to\n the URL path.\n\n Example:\n\n     service Messaging\
    \ {\n       rpc GetMessage(GetMessageRequest) returns (Message) {\n         option\
    \ (google.api.http) = {\n             get: \"/v1/{name=messages/*}\"\n       \
    \  };\n       }\n     }\n     message GetMessageRequest {\n       string name\
    \ = 1; // Mapped to URL path.\n     }\n     message Message {\n       string text\
    \ = 1; // The resource content.\n     }\n\n This enables an HTTP REST to gRPC\
    \ mapping as below:\n\n - HTTP: `GET /v1/messages/123456`\n - gRPC: `GetMessage(name:\
    \ \"messages/123456\")`\n\n Any fields in the request message which are not bound\
    \ by the path template\n automatically become HTTP query parameters if there is\
    \ no HTTP request body.\n For example:\n\n     service Messaging {\n       rpc\
    \ GetMessage(GetMessageRequest) returns (Message) {\n         option (google.api.http)\
    \ = {\n             get:\"/v1/messages/{message_id}\"\n         };\n       }\n\
    \     }\n     message GetMessageRequest {\n       message SubMessage {\n     \
    \    string subfield = 1;\n       }\n       string message_id = 1; // Mapped to\
    \ URL path.\n       int64 revision = 2;    // Mapped to URL query parameter `revision`.\n\
    \       SubMessage sub = 3;    // Mapped to URL query parameter `sub.subfield`.\n\
    \     }\n\n This enables a HTTP JSON to RPC mapping as below:\n\n - HTTP: `GET\
    \ /v1/messages/123456?revision=2&sub.subfield=foo`\n - gRPC: `GetMessage(message_id:\
    \ \"123456\" revision: 2 sub:\n SubMessage(subfield: \"foo\"))`\n\n Note that\
    \ fields which are mapped to URL query parameters must have a\n primitive type\
    \ or a repeated primitive type or a non-repeated message type.\n In the case of\
    \ a repeated type, the parameter can be repeated in the URL\n as `...?param=A&param=B`.\
    \ In the case of a message type, each field of the\n message is mapped to a separate\
    \ parameter, such as\n `...?foo.a=A&foo.b=B&foo.c=C`.\n\n For HTTP methods that\
    \ allow a request body, the `body` field\n specifies the mapping. Consider a REST\
    \ update method on the\n message resource collection:\n\n     service Messaging\
    \ {\n       rpc UpdateMessage(UpdateMessageRequest) returns (Message) {\n    \
    \     option (google.api.http) = {\n           patch: \"/v1/messages/{message_id}\"\
    \n           body: \"message\"\n         };\n       }\n     }\n     message UpdateMessageRequest\
    \ {\n       string message_id = 1; // mapped to the URL\n       Message message\
    \ = 2;   // mapped to the body\n     }\n\n The following HTTP JSON to RPC mapping\
    \ is enabled, where the\n representation of the JSON in the request body is determined\
    \ by\n protos JSON encoding:\n\n - HTTP: `PATCH /v1/messages/123456 { \"text\"\
    : \"Hi!\" }`\n - gRPC: `UpdateMessage(message_id: \"123456\" message { text: \"\
    Hi!\" })`\n\n The special name `*` can be used in the body mapping to define that\n\
    \ every field not bound by the path template should be mapped to the\n request\
    \ body.  This enables the following alternative definition of\n the update method:\n\
    \n     service Messaging {\n       rpc UpdateMessage(Message) returns (Message)\
    \ {\n         option (google.api.http) = {\n           patch: \"/v1/messages/{message_id}\"\
    \n           body: \"*\"\n         };\n       }\n     }\n     message Message\
    \ {\n       string message_id = 1;\n       string text = 2;\n     }\n\n\n The\
    \ following HTTP JSON to RPC mapping is enabled:\n\n - HTTP: `PATCH /v1/messages/123456\
    \ { \"text\": \"Hi!\" }`\n - gRPC: `UpdateMessage(message_id: \"123456\" text:\
    \ \"Hi!\")`\n\n Note that when using `*` in the body mapping, it is not possible\
    \ to\n have HTTP parameters, as all fields not bound by the path end in\n the\
    \ body. This makes this option more rarely used in practice when\n defining REST\
    \ APIs. The common usage of `*` is in custom methods\n which don't use the URL\
    \ at all for transferring data.\n\n It is possible to define multiple HTTP methods\
    \ for one RPC by using\n the `additional_bindings` option. Example:\n\n     service\
    \ Messaging {\n       rpc GetMessage(GetMessageRequest) returns (Message) {\n\
    \         option (google.api.http) = {\n           get: \"/v1/messages/{message_id}\"\
    \n           additional_bindings {\n             get: \"/v1/users/{user_id}/messages/{message_id}\"\
    \n           }\n         };\n       }\n     }\n     message GetMessageRequest\
    \ {\n       string message_id = 1;\n       string user_id = 2;\n     }\n\n This\
    \ enables the following two alternative HTTP JSON to RPC mappings:\n\n - HTTP:\
    \ `GET /v1/messages/123456`\n - gRPC: `GetMessage(message_id: \"123456\")`\n\n\
    \ - HTTP: `GET /v1/users/me/messages/123456`\n - gRPC: `GetMessage(user_id: \"\
    me\" message_id: \"123456\")`\n\n Rules for HTTP mapping\n\n 1. Leaf request fields\
    \ (recursive expansion nested messages in the request\n    message) are classified\
    \ into three categories:\n    - Fields referred by the path template. They are\
    \ passed via the URL path.\n    - Fields referred by the [HttpRule.body][google.api.HttpRule.body].\
    \ They\n    are passed via the HTTP\n      request body.\n    - All other fields\
    \ are passed via the URL query parameters, and the\n      parameter name is the\
    \ field path in the request message. A repeated\n      field can be represented\
    \ as multiple query parameters under the same\n      name.\n  2. If [HttpRule.body][google.api.HttpRule.body]\
    \ is \"*\", there is no URL\n  query parameter, all fields\n     are passed via\
    \ URL path and HTTP request body.\n  3. If [HttpRule.body][google.api.HttpRule.body]\
    \ is omitted, there is no HTTP\n  request body, all\n     fields are passed via\
    \ URL path and URL query parameters.\n\n Path template syntax\n\n     Template\
    \ = \"/\" Segments [ Verb ] ;\n     Segments = Segment { \"/\" Segment } ;\n \
    \    Segment  = \"*\" | \"**\" | LITERAL | Variable ;\n     Variable = \"{\" FieldPath\
    \ [ \"=\" Segments ] \"}\" ;\n     FieldPath = IDENT { \".\" IDENT } ;\n     Verb\
    \     = \":\" LITERAL ;\n\n The syntax `*` matches a single URL path segment.\
    \ The syntax `**` matches\n zero or more URL path segments, which must be the\
    \ last part of the URL path\n except the `Verb`.\n\n The syntax `Variable` matches\
    \ part of the URL path as specified by its\n template. A variable template must\
    \ not contain other variables. If a variable\n matches a single path segment,\
    \ its template may be omitted, e.g. `{var}`\n is equivalent to `{var=*}`.\n\n\
    \ The syntax `LITERAL` matches literal text in the URL path. If the `LITERAL`\n\
    \ contains any reserved character, such characters should be percent-encoded\n\
    \ before the matching.\n\n If a variable contains exactly one path segment, such\
    \ as `\"{var}\"` or\n `\"{var=*}\"`, when such a variable is expanded into a URL\
    \ path on the client\n side, all characters except `[-_.~0-9a-zA-Z]` are percent-encoded.\
    \ The\n server side does the reverse decoding. Such variables show up in the\n\
    \ [Discovery\n Document](https://developers.google.com/discovery/v1/reference/apis)\
    \ as\n `{var}`.\n\n If a variable contains multiple path segments, such as `\"\
    {var=foo/*}\"`\n or `\"{var=**}\"`, when such a variable is expanded into a URL\
    \ path on the\n client side, all characters except `[-_.~/0-9a-zA-Z]` are percent-encoded.\n\
    \ The server side does the reverse decoding, except \"%2F\" and \"%2f\" are left\n\
    \ unchanged. Such variables show up in the\n [Discovery\n Document](https://developers.google.com/discovery/v1/reference/apis)\
    \ as\n `{+var}`.\n\n Using gRPC API Service Configuration\n\n gRPC API Service\
    \ Configuration (service config) is a configuration language\n for configuring\
    \ a gRPC service to become a user-facing product. The\n service config is simply\
    \ the YAML representation of the `google.api.Service`\n proto message.\n\n As\
    \ an alternative to annotating your proto file, you can configure gRPC\n transcoding\
    \ in your service config YAML files. You do this by specifying a\n `HttpRule`\
    \ that maps the gRPC method to a REST endpoint, achieving the same\n effect as\
    \ the proto annotation. This can be particularly useful if you\n have a proto\
    \ that is reused in multiple services. Note that any transcoding\n specified in\
    \ the service config will override any matching transcoding\n configuration in\
    \ the proto.\n\n The following example selects a gRPC method and applies an `HttpRule`\
    \ to it:\n\n     http:\n       rules:\n         - selector: example.v1.Messaging.GetMessage\n\
    \           get: /v1/messages/{message_id}/{sub.subfield}\n\n Special notes\n\n\
    \ When gRPC Transcoding is used to map a gRPC to JSON REST endpoints, the\n proto\
    \ to JSON conversion must follow the [proto3\n specification](https://developers.google.com/protocol-buffers/docs/proto3#json).\n\
    \n While the single segment variable follows the semantics of\n [RFC 6570](https://tools.ietf.org/html/rfc6570)\
    \ Section 3.2.2 Simple String\n Expansion, the multi segment variable **does not**\
    \ follow RFC 6570 Section\n 3.2.3 Reserved Expansion. The reason is that the Reserved\
    \ Expansion\n does not expand special characters like `?` and `#`, which would\
    \ lead\n to invalid URLs. As the result, gRPC Transcoding uses a custom encoding\n\
    \ for multi segment variables.\n\n The path variables **must not** refer to any\
    \ repeated or mapped field,\n because client libraries are not capable of handling\
    \ such variable expansion.\n\n The path variables **must not** capture the leading\
    \ \"/\" character. The reason\n is that the most common use case \"{var}\" does\
    \ not capture the leading \"/\"\n character. For consistency, all path variables\
    \ must share the same behavior.\n\n Repeated message fields must not be mapped\
    \ to URL query parameters, because\n no client library can support such complicated\
    \ mapping.\n\n If an API needs to use a JSON array for request or response body,\
    \ it can map\n the request or response body to a repeated field. However, some\
    \ gRPC\n Transcoding implementations may not support this feature."
