BusinessMetrics:
  type: object
  properties:
    metric_id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:metric_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    metric_name:
      type: string
      description: '@inject_tag: gorm:"column:metric_name;not null"'
    type:
      $ref: '#/components/schemas/MetricType'
      description: '@inject_tag: gorm:"column:type;not null;serializer:proto_enum"'
    value:
      type: number
      format: double
      description: '@inject_tag: gorm:"column:value;not null"'
    dimensions:
      type: object
      additionalProperties:
        type: string
      description: Map field (key-value pairs)
    recorded_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:recorded_at;not null;serializer:proto_timestamp"'
      x-database-default: CURRENT_TIMESTAMP
  description: "BusinessMetrics for KPIs and dashboards\n Maps to 'business_metrics'\
    \ table in analytics_schema"
  required:
  - metric_id
  - metric_name
  - type
  - value
  - recorded_at
