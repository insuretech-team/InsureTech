RefreshTokenResponse:
  type: object
  properties:
    access_token:
      type: string
    refresh_token:
      type: string
      description: New refresh token (rotation)
    access_token_expires_in:
      type: integer
      format: int32
    refresh_token_expires_in:
      type: integer
      format: int32
    session_id:
      type: string
      description: Session identifier
    session_expires_at:
      type: string
      format: date-time
      description: When session expires
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for refresh token operation. Returns operation results
    and status.
