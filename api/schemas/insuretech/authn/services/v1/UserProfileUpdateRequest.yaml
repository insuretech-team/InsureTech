UserProfileUpdateRequest:
  type: object
  properties:
    user_id:
      type: string
    full_name:
      type: string
    date_of_birth:
      type: string
      format: date-time
    gender:
      type: string
    occupation:
      type: string
    employer:
      type: string
    address_line1:
      type: string
    address_line2:
      type: string
    city:
      type: string
    district:
      type: string
    division:
      type: string
    country:
      type: string
    postal_code:
      type: string
    permanent_address:
      type: string
    nid_number:
      type: string
    marital_status:
      type: string
    emergency_contact_name:
      type: string
    emergency_contact_number:
      type: string
    profile_photo_url:
      type: string
    income_range:
      type: string
    nationality:
      type: string
    blood_group:
      type: string
    passport_number:
      type: string
  description: Request payload for updating an existing user profile update. Contains
    fields to be modified.
