PolicyRuleUpdateRequest:
  type: object
  properties:
    policy_id:
      type: string
    action:
      type: string
    effect:
      $ref: '#/components/schemas/PolicyEffect'
    condition:
      type: string
    description:
      type: string
    is_active:
      type: boolean
    updated_by:
      type: string
  description: Request payload for updating an existing policy rule update. Contains
    fields to be modified.
