PolicyRulesListingRequest:
  type: object
  properties:
    domain:
      type: string
      description: filter by domain
    subject:
      type: string
      description: filter by subject
    object:
      type: string
      description: filter by object prefix
    active_only:
      type: boolean
    page_size:
      type: integer
      format: int32
    page_token:
      type: string
  description: Request payload for listing policy rules listing items. Supports filtering,
    sorting, and pagination.
