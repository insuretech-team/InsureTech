PurchaseOrder:
  type: object
  properties:
    purchase_order_id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:purchase_order_id;not null"'
    purchase_order_number:
      type: string
      description: '@inject_tag: gorm:"column:purchase_order_number;not null"'
    business_id:
      type: string
      description: '@inject_tag: gorm:"column:business_id;not null"'
    department_id:
      type: string
      description: '@inject_tag: gorm:"column:department_id;not null"'
    product_id:
      type: string
      description: '@inject_tag: gorm:"column:product_id;not null"'
    plan_id:
      type: string
      description: '@inject_tag: gorm:"column:plan_id;not null"'
    insurance_category:
      $ref: '#/components/schemas/InsuranceType'
      description: '@inject_tag: gorm:"column:insurance_category;not null"'
    employee_count:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:employee_count;not null"'
    number_of_dependents:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:number_of_dependents;not null"'
    coverage_amount:
      $ref: '#/components/schemas/Money'
    estimated_premium:
      $ref: '#/components/schemas/Money'
    status:
      $ref: '#/components/schemas/PurchaseOrderStatus'
      description: '@inject_tag: gorm:"column:status;not null;serializer:proto_enum"'
    requested_by:
      type: string
      description: '@inject_tag: gorm:"column:requested_by"'
    notes:
      type: string
      description: '@inject_tag: gorm:"column:notes"'
    created_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"'
    updated_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"'
    deleted_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:deleted_at;serializer:proto_timestamp"'
  description: "PurchaseOrder represents a business purchase request for an insurance\
    \ product\n plan."
