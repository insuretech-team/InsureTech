EmployeeCreationRequest:
  type: object
  properties:
    name:
      type: string
    employee_id:
      type: string
    department_id:
      type: string
    business_id:
      type: string
      description: business_id injected server-side; do NOT pass from frontend.
    insurance_category:
      $ref: '#/components/schemas/InsuranceType'
    assigned_plan_id:
      type: string
    coverage_amount:
      $ref: '#/components/schemas/Money'
    number_of_dependent:
      type: integer
      format: int32
    email:
      type: string
      description: New PII fields
    mobile_number:
      type: string
    date_of_birth:
      type: string
    date_of_joining:
      type: string
    gender:
      $ref: '#/components/schemas/EmployeeGender'
  description: Request payload for creating a new employee creation. Contains all
    required fields and optional parameters for initialization.
