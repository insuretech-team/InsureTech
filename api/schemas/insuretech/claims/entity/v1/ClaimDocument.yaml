ClaimDocument:
  type: object
  properties:
    document_id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:document_id;not null"'
    claim_id:
      type: string
      description: '@inject_tag: gorm:"column:claim_id;not null"'
    document_type:
      type: string
      description: '@inject_tag: gorm:"column:document_type;not null"'
    file_url:
      type: string
      description: '@inject_tag: gorm:"column:file_url;not null"'
    file_hash:
      type: string
      description: '@inject_tag: gorm:"column:file_hash;not null"'
    uploaded_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:uploaded_at;not null;serializer:proto_timestamp"'
    verified:
      type: boolean
      description: '@inject_tag: gorm:"column:verified;not null"'
    verified_by:
      type: string
      description: '@inject_tag: gorm:"column:verified_by"'
    created_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"'
    updated_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"'
  description: "Claim supporting documents\n Maps to 'claim_documents' table in claims_schema"
