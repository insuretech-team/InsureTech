CommissionCalculationResponse:
  type: object
  properties:
    commission_id:
      type: string
    commission_number:
      type: string
    amount:
      $ref: '#/components/schemas/Money'
    calculation_breakdown:
      type: string
      description: JSON
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for commission calculation operation. Returns operation
    results and status.
