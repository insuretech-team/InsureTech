DocumentTemplate:
  type: object
  properties:
    id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:template_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    name:
      type: string
      description: '@inject_tag: gorm:"column:name;not null"'
      x-unique: true
    type:
      $ref: '#/components/schemas/DocumentDocumentType'
      description: '@inject_tag: gorm:"column:type;not null;serializer:proto_enum"'
    description:
      type: string
      description: '@inject_tag: gorm:"column:description"'
    template_content:
      type: string
      description: '@inject_tag: gorm:"column:template_content;not null"'
    output_format:
      $ref: '#/components/schemas/OutputFormat'
      description: '@inject_tag: gorm:"column:output_format;not null;serializer:proto_enum"'
    variables:
      type: string
      description: '@inject_tag: gorm:"column:variables"'
    version:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:version;not null"'
      default: 1
    is_active:
      type: boolean
      description: '@inject_tag: gorm:"column:is_active"'
      default: true
    audit_info:
      allOf:
      - $ref: '#/components/schemas/AuditInfo'
      x-database-default: '{}''::jsonb'
  description: Document template (FR-035, FR-091)
  required:
  - id
  - name
  - type
  - template_content
  - output_format
  - version
  - audit_info
