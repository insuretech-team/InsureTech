DocumentTemplatesListingResponse:
  type: object
  properties:
    templates:
      type: array
      items:
        $ref: '#/components/schemas/DocumentTemplate'
    next_page_token:
      type: string
    total_count:
      type: integer
      format: int32
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for document templates listing operation. Returns
    operation results and status.
