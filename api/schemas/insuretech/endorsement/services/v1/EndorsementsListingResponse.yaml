EndorsementsListingResponse:
  type: object
  properties:
    endorsements:
      type: array
      items:
        $ref: '#/components/schemas/Endorsement'
    total_count:
      type: integer
      format: int32
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for endorsements listing operation. Returns operation
    results and status.
