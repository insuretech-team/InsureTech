RiskFactor:
  type: object
  properties:
    factor_name:
      type: string
      description: e.g., "Harsh Braking"
    impact_score:
      type: number
      format: double
      description: Contribution to risk
    occurrence_count:
      type: integer
      format: int32
    description:
      type: string
  description: Domain entity representing risk factor. Core business object in the
    system.
