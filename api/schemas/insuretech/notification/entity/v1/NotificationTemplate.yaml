NotificationTemplate:
  type: object
  properties:
    template_id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:template_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    template_name:
      type: string
      description: '@inject_tag: gorm:"column:template_name;not null"'
      x-unique: true
    type:
      $ref: '#/components/schemas/NotificationType'
      description: '@inject_tag: gorm:"column:type;not null;serializer:proto_enum"'
    channel:
      $ref: '#/components/schemas/NotificationChannel'
      description: '@inject_tag: gorm:"column:channel;not null;serializer:proto_enum"'
    subject_template:
      type: string
      description: '@inject_tag: gorm:"column:subject_template"'
    body_template:
      type: string
      description: '@inject_tag: gorm:"column:body_template;not null"'
    language:
      type: string
      description: '@inject_tag: gorm:"column:language;not null"'
      default: en
    created_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"'
      x-database-default: CURRENT_TIMESTAMP
    updated_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"'
      x-database-default: CURRENT_TIMESTAMP
    is_active:
      type: boolean
      description: '@inject_tag: gorm:"column:is_active;not null"'
      default: true
  description: "NotificationTemplate for reusable templates\n Maps to 'notification_templates'\
    \ table in notification_schema"
  required:
  - template_id
  - template_name
  - type
  - channel
  - body_template
  - language
  - created_at
  - updated_at
  - is_active
