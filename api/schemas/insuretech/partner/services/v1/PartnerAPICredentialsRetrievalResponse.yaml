PartnerAPICredentialsRetrievalResponse:
  type: object
  properties:
    api_key:
      type: string
    api_secret:
      type: string
    expires_at:
      type: string
      format: date-time
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for partner api credentials retrieval operation. Returns
    operation results and status.
