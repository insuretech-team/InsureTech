PartnerCommissionRetrievalResponse:
  type: object
  properties:
    partner_id:
      type: string
    total_commission:
      $ref: '#/components/schemas/Money'
    currency:
      type: string
    details:
      type: array
      items:
        $ref: '#/components/schemas/CommissionDetail'
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for partner commission retrieval operation. Returns
    operation results and status.
