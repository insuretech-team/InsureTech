PaymentMethodsListingResponse:
  type: object
  properties:
    payment_methods:
      type: array
      items:
        $ref: '#/components/schemas/PaymentPaymentMethod'
    next_page_token:
      type: string
    total_count:
      type: integer
      format: int32
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for payment methods listing operation. Returns operation
    results and status.
