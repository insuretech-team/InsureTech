PaymentReceiptRetrievalResponse:
  type: object
  properties:
    payment_id:
      type: string
    receipt_number:
      type: string
    receipt_file_id:
      type: string
    receipt_url:
      type: string
      description: Pre-signed download URL
    generated_at:
      type: string
      format: date-time
    error:
      $ref: '#/components/schemas/Error'
  description: Response payload for payment receipt retrieval operation. Returns operation
    results and status.
