Product:
  type: object
  properties:
    product_id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:product_id;not null"'
    product_code:
      type: string
    product_name:
      type: string
      description: '@inject_tag: gorm:"column:product_name;not null"'
    category:
      $ref: '#/components/schemas/ProductCategory'
      description: '@inject_tag: gorm:"column:category;not null;serializer:proto_enum"'
    description:
      type: string
      description: '@inject_tag: gorm:"column:description"'
    base_premium:
      $ref: '#/components/schemas/Money'
      description: '@inject_tag: gorm:"column:base_premium;not null"'
    min_sum_insured:
      $ref: '#/components/schemas/Money'
      description: '@inject_tag: gorm:"column:min_sum_insured;not null"'
    max_sum_insured:
      $ref: '#/components/schemas/Money'
      description: '@inject_tag: gorm:"column:max_sum_insured;not null"'
    min_tenure_months:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:min_tenure_months;not null"'
    max_tenure_months:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:max_tenure_months;not null"'
    exclusions:
      type: array
      items:
        type: string
    status:
      $ref: '#/components/schemas/ProductsProductStatus'
      description: '@inject_tag: gorm:"column:status;not null;serializer:proto_enum"'
    created_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"'
    updated_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"'
    created_by:
      type: string
      description: '@inject_tag: gorm:"column:created_by;not null"'
    deleted_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:deleted_at;serializer:proto_timestamp"'
    available_riders:
      type: array
      items:
        $ref: '#/components/schemas/ProductsRider'
        description: Related entities
      description: Related entities
    pricing_config:
      $ref: '#/components/schemas/PricingConfig'
    product_attributes:
      type: string
      description: '@inject_tag: gorm:"column:product_attributes"'
    plans:
      type: array
      items:
        $ref: '#/components/schemas/ProductPlan'
    base_premium_currency:
      type: string
      description: "Currency companion fields for Money types (flattened storage)\n\
        \ @inject_tag: gorm:\"column:base_premium_currency;not null\""
    min_sum_insured_currency:
      type: string
      description: '@inject_tag: gorm:"column:min_sum_insured_currency;not null"'
    max_sum_insured_currency:
      type: string
      description: '@inject_tag: gorm:"column:max_sum_insured_currency;not null"'
  description: "Product represents an insurance product (Motor, Health, Travel, Device,\
    \ etc.)\n Maps to 'products' table in product_schema"
