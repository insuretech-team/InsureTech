ProductsProductsListingResponse:
  type: object
  properties:
    products:
      type: array
      items:
        $ref: '#/components/schemas/Product'
    total_count:
      type: integer
      format: int32
    page:
      type: integer
      format: int32
    page_size:
      type: integer
      format: int32
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for products listing operation. Returns operation
    results and status.
