RefundCalculationResponse:
  type: object
  properties:
    total_premium_paid:
      type: string
    premium_used:
      type: string
    cancellation_charge:
      type: string
    refundable_amount:
      $ref: '#/components/schemas/Money'
    calculation_details:
      type: string
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for refund calculation operation. Returns operation
    results and status.
