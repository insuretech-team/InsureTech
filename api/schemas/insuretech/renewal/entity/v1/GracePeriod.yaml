GracePeriod:
  type: object
  properties:
    id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:grace_period_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    policy_id:
      type: string
      description: '@inject_tag: gorm:"column:policy_id;not null"'
    start_date:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:start_date;not null;serializer:proto_timestamp"'
    end_date:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:end_date;not null;serializer:proto_timestamp"'
    days_remaining:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:days_remaining"'
    status:
      allOf:
      - $ref: '#/components/schemas/GracePeriodStatus'
      x-database-default: ACTIVE
    coverage_active:
      type: boolean
      description: '@inject_tag: gorm:"column:coverage_active"'
      default: true
    revived_at:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:revived_at;serializer:proto_timestamp"'
    audit_info:
      allOf:
      - $ref: '#/components/schemas/AuditInfo'
      x-database-default: '{}''::jsonb'
  description: Grace period tracking (FR-089, FR-090)
  required:
  - id
  - policy_id
  - start_date
  - end_date
  - status
  - audit_info
