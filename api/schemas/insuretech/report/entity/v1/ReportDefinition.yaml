ReportDefinition:
  type: object
  properties:
    id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:report_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    name:
      type: string
      description: '@inject_tag: gorm:"column:name;not null"'
      x-unique: true
    category:
      $ref: '#/components/schemas/ReportCategory'
      description: '@inject_tag: gorm:"column:category;not null;serializer:proto_enum"'
    description:
      type: string
      description: '@inject_tag: gorm:"column:description"'
    query:
      type: string
      description: '@inject_tag: gorm:"column:query;not null"'
    parameters:
      type: string
      description: '@inject_tag: gorm:"column:parameters"'
    format_config:
      type: string
      description: '@inject_tag: gorm:"column:format_config"'
    is_active:
      type: boolean
      description: '@inject_tag: gorm:"column:is_active"'
      default: true
    audit_info:
      allOf:
      - $ref: '#/components/schemas/AuditInfo'
      x-database-default: '{}''::jsonb'
  description: Report definition (FR-137 to FR-139)
  required:
  - id
  - name
  - category
  - query
  - audit_info
