FAQsListingResponse:
  type: object
  properties:
    faqs:
      type: array
      items:
        $ref: '#/components/schemas/FAQ'
    next_page_token:
      type: string
    total_count:
      type: integer
      format: int32
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for fa qs listing operation. Returns operation results
    and status.
