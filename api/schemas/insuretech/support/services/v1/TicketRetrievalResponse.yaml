TicketRetrievalResponse:
  type: object
  properties:
    ticket:
      $ref: '#/components/schemas/Ticket'
    messages:
      type: array
      items:
        $ref: '#/components/schemas/TicketMessage'
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for ticket retrieval operation. Returns operation
    results and status.
