TicketsListingResponse:
  type: object
  properties:
    tickets:
      type: array
      items:
        $ref: '#/components/schemas/Ticket'
    total_count:
      type: integer
      format: int32
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for tickets listing operation. Returns operation results
    and status.
