TenantConfig:
  type: object
  properties:
    id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:config_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    tenant_id:
      type: string
      description: '@inject_tag: gorm:"column:tenant_id;not null"'
    config_key:
      type: string
      description: '@inject_tag: gorm:"column:config_key;not null"'
    config_value:
      type: string
      description: '@inject_tag: gorm:"column:config_value;not null"'
    type:
      $ref: '#/components/schemas/ConfigType'
      description: '@inject_tag: gorm:"column:type;not null;serializer:proto_enum"'
    description:
      type: string
      description: '@inject_tag: gorm:"column:description"'
    audit_info:
      allOf:
      - $ref: '#/components/schemas/AuditInfo'
      x-database-default: '{}''::jsonb'
  description: Tenant configuration
  required:
  - id
  - tenant_id
  - config_key
  - config_value
  - type
  - audit_info
