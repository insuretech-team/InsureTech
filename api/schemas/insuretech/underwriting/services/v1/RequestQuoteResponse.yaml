RequestQuoteResponse:
  type: object
  properties:
    quote_id:
      type: string
    quote_number:
      type: string
    base_premium:
      $ref: '#/components/schemas/Money'
    total_premium:
      $ref: '#/components/schemas/Money'
    valid_until:
      type: string
    message:
      type: string
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for request quote operation. Returns operation results
    and status.
