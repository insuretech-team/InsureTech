VoiceTranscript:
  type: object
  properties:
    id:
      type: string
      description: '@inject_tag: gorm:"primaryKey;column:transcript_id;not null"'
      x-primary-key: true
      x-database-default: gen_random_uuid()
    voice_session_id:
      type: string
      description: '@inject_tag: gorm:"column:voice_session_id;not null"'
    speaker:
      $ref: '#/components/schemas/SpeakerType'
      description: '@inject_tag: gorm:"column:speaker;not null;serializer:proto_enum"'
    text:
      type: string
      description: '@inject_tag: gorm:"column:text;not null"'
      x-pii: true
      x-encrypted: true
      x-log-masked: true
      x-requires-consent: true
      x-data-purpose: Voice interaction transcript for service improvement
      x-retention-days: 365
    language:
      type: string
      description: '@inject_tag: gorm:"column:language;not null"'
    confidence:
      type: number
      format: float
      description: '@inject_tag: gorm:"column:confidence"'
    sequence_number:
      type: integer
      format: int32
      description: '@inject_tag: gorm:"column:sequence_number;not null"'
    timestamp:
      type: string
      format: date-time
      description: '@inject_tag: gorm:"column:timestamp;not null;serializer:proto_timestamp"'
      x-database-default: now()
    audit_info:
      allOf:
      - $ref: '#/components/schemas/AuditInfo'
      x-database-default: '{}''::jsonb'
  description: Voice interaction transcript
  required:
  - id
  - voice_session_id
  - speaker
  - text
  - language
  - sequence_number
  - timestamp
  - audit_info
