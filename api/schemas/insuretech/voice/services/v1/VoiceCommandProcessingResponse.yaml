VoiceCommandProcessingResponse:
  type: object
  properties:
    voice_command_id:
      type: string
    command_type:
      type: string
    response_text:
      type: string
    response_audio_url:
      type: string
    confidence_score:
      type: number
      format: float
    error:
      $ref: '#/components/schemas/Error'
      description: Error information if operation failed
  description: Response payload for voice command processing operation. Returns operation
    results and status.
