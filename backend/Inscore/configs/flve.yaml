  backend: "hybrid"
  
  # HuggingFace Space URL (use the hf.space domain)
  hf_endpoint: "https://farukhannan-flve.hf.space"
  hf_token: "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"
  
  # Models S3 Bucket (CDN)
  main_cdn: "https://lcst.sgp1.cdn.digitaloceanspaces.com"
  cdn_url: "https://lcst.sgp1.cdn.digitaloceanspaces.com/labaidai/models"
  access_key: "DO00KHVNHGMWXAGZCBCB"
  secret_key: "POboLPZf/VTXo7gwapINAgZWDAHk5fPcJ/0WpRfMFk4"
  
  # Local models directory
