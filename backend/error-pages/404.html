<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Trendyco</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 30px;
        }
        h1 {
            color: #667eea;
            font-size: 4em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        h2 {
            color: #555;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: 500;
        }
        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            transition: all 0.3s;
            font-weight: 500;
            margin: 5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
        }
        .btn-secondary {
            background: #6c757d;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
        }
        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 6px 20px rgba(90, 98, 104, 0.5);
        }
        .search-box {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .search-box button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .search-box button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TrendyCo</div>
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>
            The page you're looking for doesn't exist or has been moved.
            Let's get you back on track!
        </p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search our store..." />
            <button onclick="searchSite()">Search</button>
        </div>
        
        <div style="margin-top: 20px;">
            <a href="/" class="btn">Go Home</a>
            <a href="/products" class="btn btn-secondary">Browse Products</a>
        </div>
    </div>
    
    <script>
        function searchSite() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                window.location.href = '/products?search=' + encodeURIComponent(query);
            }
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchSite();
            }
        });
    </script>
</body>
</html>
