# Cache Bypass Rules
# Conditions to bypass cache

# Bypass cache for non-GET/HEAD requests
map $request_method $skip_cache {
    default 0;
    POST    1;
    PUT     1;
    DELETE  1;
    PATCH   1;
}

# Bypass cache when Authorization header is present
map $http_authorization $skip_cache_auth {
    default 1;
    ""      0;
}

# Bypass cache for authenticated sessions
map $http_cookie $skip_cache_cookie {
    default 0;
    "~*session" 1;
    "~*token" 1;
    "~*auth" 1;
}

# Bypass cache for specific URIs
map $request_uri $skip_cache_uri {
    default 0;
    "~*/admin" 1;
    "~*/cart" 1;
    "~*/checkout" 1;
    "~*/account" 1;
}

# Final bypass decision (if any condition is true, bypass cache)
map $skip_cache$skip_cache_auth$skip_cache_cookie$skip_cache_uri $final_skip_cache {
    default 0;
    "~*1" 1;
}
