# Cache Zone Definitions
# Multi-tier caching strategy

# Static asset cache - 1GB, 7 days inactive
proxy_cache_path /var/cache/nginx/static 
    levels=1:2 
    keys_zone=static_cache:100m 
    max_size=1g 
    inactive=7d 
    use_temp_path=off;

# API response cache - 500MB, 1 hour inactive
proxy_cache_path /var/cache/nginx/api 
    levels=1:2 
    keys_zone=api_cache:50m 
    max_size=500m 
    inactive=1h 
    use_temp_path=off;

# Microcache for dynamic content - 100MB, 10 minutes inactive
proxy_cache_path /var/cache/nginx/microcache 
    levels=1:2 
    keys_zone=microcache:10m 
    max_size=100m 
    inactive=10m 
    use_temp_path=off;

# Cache key definition
proxy_cache_key "$scheme$request_method$host$request_uri";

# Cache lock settings
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;
proxy_cache_lock_age 5s;

# Cache revalidation
proxy_cache_revalidate on;
proxy_cache_background_update on;
