# Security Configuration
# Rate limiting, DDoS protection, and access control
# Note: server_tokens is set in 00-global.conf

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/s;

limit_req_status 429;
limit_req_log_level warn;

# Connection limits
limit_conn_zone $binary_remote_addr zone=addr:10m;
limit_conn_zone $server_name zone=perserver:10m;

limit_conn addr 50;
limit_conn perserver 500;

# DDoS protection timeouts
client_body_timeout 10s;
client_header_timeout 10s;
send_timeout 10s;

# Block common exploits (ENHANCED - based on actual attacks)
map $request_uri $is_exploit {
    default 0;
    # Git/Version control exposure
    "~*/\\.git" 1;
    "~*/\\.svn" 1;
    "~*/\\.hg" 1;
    
    # Environment files
    "~*/\\.env" 1;
    "~*/\\.env\\.prod" 1;
    "~*/\\.env\\.production" 1;
    "~*/\\.env\\.staging" 1;
    "~*/.env.prod" 1;
    "~*/.env.production" 1;
    
    # PHP exploits
    "~*phpinfo" 1;
    "~*eval-stdin\\.php" 1;
    "~*/vendor/phpunit" 1;
    "~*/phpunit" 1;
    "~*pearcmd" 1;
    "~*\\.php" 1;
    "~*index\\.php" 1;
    
    # Path traversal
    "~*\\.\\./\\.\\." 1;
    "~*%2e%2e" 1;
    "~*\\.\\./" 1;
    "~*\\.\\.%2f" 1;
    
    # Shell injection
    "~*/bin/sh" 1;
    "~*/bin/bash" 1;
    "~*bash.*-c" 1;
    "~*wget.*http" 1;
    "~*curl.*http" 1;
    "~*busybox" 1;
    
    # Framework/CMS exploits
    "~*/actuator" 1;
    "~*/swagger" 1;
    "~*/_profiler" 1;
    "~*/graphql" 1;
    "~*/_all_dbs" 1;
    "~*/login\\.action" 1;
    "~*/ecp/Current" 1;
    
    # WordPress (we don't use it)
    "~*/wp-content" 1;
    "~*/wp-admin" 1;
    "~*/wp-includes" 1;
    "~*/wp-login" 1;
    
    # CGI exploits
    "~*/cgi-bin" 1;
    "~*\\.cgi" 1;
    
    # Config/sensitive files
    "~*/\\.DS_Store" 1;
    "~*/\\.htaccess" 1;
    "~*/web\\.config" 1;
    "~*/backup" 1;
    "~*/\\.bak" 1;
    "~*/\\.old" 1;
    "~*/\\.log" 1;
    
    # Remote access
    "~*/remote/login" 1;
    "~*/sslvpnLogin" 1;
    "~*/auth\\.html" 1;
    "~*/wsman" 1;
    "~*/webui" 1;
    
    # Database access
    "~*/solr" 1;
    "~*/_db" 1;
    "~*/phpmyadmin" 1;
    
    # Cloud/API keys
    "~*/aws" 1;
    "~*/secrets" 1;
    "~*/private.*\\.json" 1;
    
    # SQL injection
    "~*(union.*select|insert.*into|drop.*table)" 1;
    "~*(select.*from|delete.*from)" 1;
    
    # XSS
    "~*(<script|javascript:)" 1;
    "~*(onerror|onload)=" 1;
    
    # File inclusion
    "~*(etc/passwd|proc/self)" 1;
    "~*(boot\\.ini|win\\.ini)" 1;
    
    # Code injection
    "~*(eval\\(|base64_decode|gzinflate)" 1;
    "~*exec\\(" 1;
    "~*system\\(" 1;
    
    # ThinkPHP exploit
    "~*invokefunction" 1;
    "~*think\\\\app" 1;
}

# Block bad user agents (ENHANCED - based on actual attacks)
map $http_user_agent $bad_bot {
    default 0;
    # Empty user agent
    "" 1;
    
    # Attack tools
    "~*libredtail" 1;
    "~*rondo2012" 1;
    "~*cypex\\.ai" 1;
    "~*l9scan" 1;
    "~*(nmap|sqlmap|nikto|wikto)" 1;
    "~*masscan" 1;
    "~*nessus" 1;
    "~*openvas" 1;
    
    # Aggressive scrapers
    "~*Bytespider" 1;
    "~*MJ12bot" 1;
    "~*AhrefsBot" 1;
    "~*SemrushBot" 1;
    "~*DotBot" 1;
    
    # Suspicious patterns
    "~*python-httpx" 1;
    "~*Go-http-client" 1;
    "~*\\(compatible;\\s*\\)" 1;
    
    # Shellshock attempt
    "~*\\(\\)" 1;
    "~*\\{\\s*:;" 1;
}

# Block unwanted methods (ENHANCED)
map $request_method $bad_method {
    default 0;
    "TRACE" 1;
    "TRACK" 1;
    "PROPFIND" 1;
    "MKCOL" 1;
    "COPY" 1;
    "MOVE" 1;
    "LOCK" 1;
    "UNLOCK" 1;
}

# Block access via IP address (force domain usage)
map $host $block_host {
    default 0;
    "147.182.226.83" 1;  # Your server IP
    "~*^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" 1;  # Any IPv4
    "~*^\\[.*\\]$" 1;  # Any IPv6
}

