version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: trendico_nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      # Main configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      
      # Configuration directories
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/upstreams:/etc/nginx/upstreams:ro
      - ./nginx/cache:/etc/nginx/cache:ro
      - ./nginx/maps:/etc/nginx/maps:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./nginx/stream.d:/etc/nginx/stream.d:ro
      
      # SSL certificates (Let's Encrypt)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      
      # Error pages
      - ./nginx/error-pages:/var/www/html:ro
      
      # Cache storage (persistent)
      - nginx_cache:/var/cache/nginx
      
      # Logs
      - nginx_logs:/var/log/nginx
    
    networks:
      - trendico_network
    
    depends_on:
      - gateway
      - trendyco
      - trendfront
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    labels:
      - "com.trendico.service=nginx"
      - "com.trendico.version=2.0"

  certbot:
    image: certbot/certbot:latest
    container_name: trendico_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - trendico_network

volumes:
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  trendico_network:
    external: true
