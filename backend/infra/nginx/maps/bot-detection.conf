# Bot Detection Map
# Classify bots as good or bad

# Good bots (allow with normal rate limits)
map $http_user_agent $good_bot {
    default 0;
    "~*Googlebot" 1;
    "~*Bingbot" 1;
    "~*Slurp" 1;  # Yahoo
    "~*DuckDuckBot" 1;
    "~*Baiduspider" 1;
    "~*YandexBot" 1;
    "~*facebookexternalhit" 1;
    "~*LinkedInBot" 1;
    "~*Twitterbot" 1;
}

# Bad bots already defined in 03-security.conf
# This is for additional rate limiting on crawlers

# Rate limit bot crawling
map $http_user_agent $limit_bots {
    default "";
    "~*bot|crawl|slurp|spider" $binary_remote_addr;
}

limit_req_zone $limit_bots zone=bots:10m rate=1r/s;
