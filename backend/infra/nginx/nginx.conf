# Trendico Nginx Main Configuration
# Version: 2.0
# Modular architecture with includes

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load dynamic modules (if available)
# include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Global HTTP configurations
    include /etc/nginx/conf.d/*.conf;
    
    # Upstream definitions
    include /etc/nginx/upstreams/*.conf;
    
    # Cache configurations
    include /etc/nginx/cache/*.conf;
    
    # Map definitions
    include /etc/nginx/maps/*.conf;
    
    # Virtual hosts (enabled sites)
    include /etc/nginx/sites-enabled/*.conf;
}

# Stream module for TCP/UDP load balancing (optional)
# Only uncomment if nginx was compiled with --with-stream
# and ngx_stream_module.so is available on the server.
# stream {
#     include /etc/nginx/stream.d/*.conf;
# }
