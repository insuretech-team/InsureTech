# =============================================================
# B2B Portal — b2b.labaidinsuretech.com
# HTTP: ACME challenge only (NO manual redirect — certbot adds
#       its own redirect when provisioning SSL, avoiding the
#       ERR_TOO_MANY_REDIRECTS double-redirect loop).
# HTTPS: proxy to Next.js on 127.0.0.1:3000 (Docker exposes it).
# =============================================================

# ── HTTP ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name b2b.labaidinsuretech.com;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Certbot will add its redirect here automatically.
    # Do NOT add a manual return 301 — it causes ERR_TOO_MANY_REDIRECTS
    # when combined with certbot's own redirect directive.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name b2b.labaidinsuretech.com;

    ssl_certificate     /etc/letsencrypt/live/b2b.labaidinsuretech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/b2b.labaidinsuretech.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/b2b-access.log;
    error_log  /var/log/nginx/b2b-error.log warn;

    # Health check
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Next.js app — Docker maps container:3000 → host:3000
    # Users hit https://b2b.labaidinsuretech.com (port 443 via nginx)
    # nginx proxies to localhost:3000 — no explicit port for users.
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_http_version 1.1;
        # WebSocket support for Next.js HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-params.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html { root /etc/nginx/error-pages; internal; }
}
