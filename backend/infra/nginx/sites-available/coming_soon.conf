# =============================================================
# Coming Soon Portals
# agents, regulator, partners, business subdomains
# HTTP: ACME challenge only (NO manual redirect — certbot adds
#       its own redirect when provisioning SSL, avoiding the
#       ERR_TOO_MANY_REDIRECTS double-redirect loop).
# HTTPS: static coming soon page.
# =============================================================

# ── HTTP ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name agents.labaidinsuretech.com
                regulator.labaidinsuretech.com
                partners.labaidinsuretech.com
                business.labaidinsuretech.com;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Certbot will add its redirect here automatically.
    # Do NOT add a manual return 301 — it causes ERR_TOO_MANY_REDIRECTS
    # when combined with certbot's own redirect directive.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS - agents ──────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name agents.labaidinsuretech.com;

    ssl_certificate     /etc/letsencrypt/live/agents.labaidinsuretech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agents.labaidinsuretech.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /var/www/coming_soon;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /static/ { alias /var/www/static/; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /etc/nginx/error-pages; internal; }
    location = /50x.html { root /etc/nginx/error-pages; internal; }
}

