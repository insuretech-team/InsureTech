# =============================================================
# Default Server — catch-all for unmatched domains / direct IP.
# Returns 444 (connection closed without response) to block
# scanners and automated attacks.
# =============================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/blocked-access.log combined;
    error_log  /var/log/nginx/blocked-error.log warn;

    # ACME challenges must work on any domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Health check for load balancer probes
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Drop everything else
    return 444;
}