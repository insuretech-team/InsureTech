# =============================================================
# API Gateway - api.labaidinsuretech.com
# HTTP: ACME challenge only (NO manual redirect — certbot adds
#       its own redirect when provisioning SSL, avoiding the
#       ERR_TOO_MANY_REDIRECTS double-redirect loop).
# HTTPS: proxy to Go gateway on 127.0.0.1:8080.
# =============================================================

# ── HTTP ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.labaidinsuretech.com;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Certbot will add its redirect here automatically.
    # Do NOT add a manual return 301 — it causes ERR_TOO_MANY_REDIRECTS
    # when combined with certbot's own redirect directive.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.labaidinsuretech.com;

    ssl_certificate     /etc/letsencrypt/live/api.labaidinsuretech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.labaidinsuretech.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/api-access.log;
    error_log  /var/log/nginx/api-error.log warn;

    # Gateway health check — proxied to real Go gateway healthz
    # Use /nginx-health for a pure nginx-level check if needed.
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        access_log off;
    }

    # Nginx-only liveness (no upstream dependency)
    location = /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # All API traffic to Go gateway
    location / {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html { root /etc/nginx/error-pages; internal; }
}
