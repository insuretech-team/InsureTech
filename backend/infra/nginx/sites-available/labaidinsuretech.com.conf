# =============================================================
# Main Site - labaidinsuretech.com
# HTTP: ACME challenge only (NO manual redirect — certbot adds
#       its own redirect when provisioning SSL, avoiding the
#       ERR_TOO_MANY_REDIRECTS double-redirect loop).
# HTTPS: serves static site.
# SSL managed by Certbot (certificates filled in at provision time).
# =============================================================

# ── HTTP ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name labaidinsuretech.com www.labaidinsuretech.com;

    # ACME challenge for Let's Encrypt cert renewal (must be before redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Certbot will add its redirect here automatically.
    # Do NOT add a manual return 301 — it causes ERR_TOO_MANY_REDIRECTS
    # when combined with certbot's own redirect directive.
    location / {
        return 301 https://$host$request_uri;
    }
}

