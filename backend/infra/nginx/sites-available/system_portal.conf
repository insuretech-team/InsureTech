# =============================================================
# System Portal - system.labaidinsuretech.com
# HTTP: ACME challenge only (NO manual redirect — certbot adds
#       its own redirect when provisioning SSL, avoiding the
#       ERR_TOO_MANY_REDIRECTS double-redirect loop).
# HTTPS: proxy to system portal on 127.0.0.1:3001 (when ready),
#        or static placeholder page.
# =============================================================

# ── HTTP ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name system.labaidinsuretech.com;

    # ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Certbot will add its redirect here automatically.
    # Do NOT add a manual return 301 — it causes ERR_TOO_MANY_REDIRECTS
    # when combined with certbot's own redirect directive.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name system.labaidinsuretech.com;

    ssl_certificate     /etc/letsencrypt/live/system.labaidinsuretech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/system.labaidinsuretech.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/system-access.log;
    error_log  /var/log/nginx/system-error.log warn;

    # API proxy - forward /v1/ calls to Go gateway
    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/snippets/proxy-params.conf;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # System portal app (port 3001 - enable when system_portal added to docker-compose)
    # Uncomment proxy_pass and comment out static block when ready:
    location / {
        # proxy_pass http://127.0.0.1:3001;
        root /var/www/system.labaidinsuretech.com;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /etc/nginx/error-pages; internal; }
    location = /50x.html { root /etc/nginx/error-pages; internal; }
}
