# Security Headers Snippet
# NOTE: HSTS is intentionally omitted — it must only be set on HTTPS servers.
# Certbot will add it automatically when SSL is configured.
# Add this include only in HTTPS server blocks, never HTTP.

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS Protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# Content Security Policy
# Allows: self, Cloudflare Insights, Google Fonts, CDN
# connect-src includes both local and production API endpoints
add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://api.labaidinsuretech.com https://api.labaidinsuretech.com ws://api.labaidinsuretech.com wss://api.labaidinsuretech.com https://static.cloudflareinsights.com https://cloudflareinsights.com" always;
