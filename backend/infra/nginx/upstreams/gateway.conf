# API Gateway Upstream Configuration
# Load balanced gateway instances

upstream insuretech_gateway {
    # Load balancing method: least_conn for better distribution
    least_conn;
    
    # Gateway servers
    server localhost:8080 max_fails=3 fail_timeout=30s weight=1;
    # Add more instances when scaling:
    # server localhost:8081 max_fails=3 fail_timeout=30s weight=1 backup;
    # server localhost:8082 max_fails=3 fail_timeout=30s weight=1 backup;
    
    # Keepalive connections
    keepalive 64;
    keepalive_timeout 90s;
    keepalive_requests 1000;
}

# Separate upstream for WebSocket connections
upstream insuretech_gateway_ws {
    least_conn;
    
    server localhost:8080 max_fails=3 fail_timeout=30s;
    # server localhost:8081 max_fails=3 fail_timeout=30s;
    
    # Long-lived connections for WebSocket
    keepalive 128;
    keepalive_timeout 1h;
}
