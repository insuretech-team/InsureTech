# Prometheus Configuration for InsureTech Multi-Service Platform
# Centralized observability configuration

global:
  scrape_interval: 15s      # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  scrape_timeout: 10s
  external_labels:
    cluster: 'insuretech'
    environment: 'development'

scrape_configs:
  # Gateway metrics (PRIMARY)
  - job_name: 'insuretech-gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/metrics/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'gateway_.*'
        action: keep

  # Gateway admin stats
  - job_name: 'insuretech-gateway-admin'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/admin/stats'
    scrape_interval: 15s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'admin_.*'
        action: keep

  # Core Infrastructure
  - job_name: 'tenant-service'
    static_configs:
      - targets: ['tenant-service:50051']
    scrape_interval: 15s
  - job_name: 'authn-service'
    static_configs:
      - targets: ['authn-service:50061']
    scrape_interval: 15s
  - job_name: 'authz-service'
