syntax = "proto3";

option csharp_namespace = "InsuranceEngine.Proto";

package insurance_engine;

service InsuranceEngineService {
  rpc GetProductQuestions (GetProductQuestionsRequest) returns (GetProductQuestionsResponse);
  
  // Core Business RPCs (Roadmap Case 1)
  rpc IssuePolicy (IssuePolicyRequest) returns (IssuePolicyResponse);
  rpc CalculatePremium (CalculatePremiumRequest) returns (CalculatePremiumResponse);
  rpc ProcessRenewal (ProcessRenewalRequest) returns (ProcessRenewalResponse);
  rpc SubmitClaim (SubmitClaimRequest) returns (SubmitClaimResponse);
}

message GetProductQuestionsRequest {
  string product_id = 1;
}

message GetProductQuestionsResponse {
  repeated RiskAssessmentQuestionProto questions = 1;
}

message RiskAssessmentQuestionProto {
  string id = 1;
  string question_text = 2;
  string question_text_bn = 3;
  string options_json = 4;
  int32 weight = 5;
}

// Roadmap Case 1 Messages

message MoneyProto {
  int64 units = 1;      // Paisa (1 BDT = 100 Paisa)
  string currency = 2;  // Default: BDT
}

message IssuePolicyRequest {
  string quote_id = 1;
  string payment_id = 2;
  string beneficiary_id = 3;
}

message IssuePolicyResponse {
  string policy_id = 1;
  string policy_number = 2;
  string message = 3;
  bool success = 4;
}

message CalculatePremiumRequest {
  string product_id = 1;
  int64 sum_insured = 2; // Paisa
  int32 tenure_months = 3;
  repeated string rider_ids = 4;
}

message CalculatePremiumResponse {
  MoneyProto base_premium = 1;
  MoneyProto total_premium = 2;
  string message = 3;
}

message ProcessRenewalRequest {
  string policy_id = 1;
  int32 tenure_months = 2;
}

message ProcessRenewalResponse {
  string new_policy_id = 1;
  string message = 2;
  bool success = 3;
}

message SubmitClaimRequest {
  string policy_id = 1;
  int64 claimed_amount = 2; // Paisa
  string incident_date = 3; // ISO-8601
  string incident_description = 4;
}

message SubmitClaimResponse {
  string claim_id = 1;
  string claim_number = 2;
  string message = 3;
  bool success = 4;
}
