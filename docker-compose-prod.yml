  b2b_portal:
    image: insuretech-b2b_portal
    build:
      context: .
      dockerfile: backend/infra/docker/b2b_portal/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into JS bundle at build time.
        # Set this to your public-facing gateway URL (e.g. https://api.yourdomain.com).
        # Overridden at build time via: docker compose build --build-arg NEXT_PUBLIC_INSURETECH_API_BASE_URL=...
        # Or set B2B_PORTAL_API_BASE_URL in your .env file.
        NEXT_PUBLIC_INSURETECH_API_BASE_URL: ${B2B_PORTAL_API_BASE_URL:-http://localhost:8080}
    container_name: insuretech-b2b-portal
    profiles: ["frontend", "full"]
    env_file:
      - .env
    environment:
      # Runtime server-side URL (read by Node.js at request time ΓÇö can differ from public URL).
      # e.g. inside Docker network, gateway is reachable as http://gateway:8080 not localhost.
      INSURETECH_API_BASE_URL: ${B2B_PORTAL_INTERNAL_API_BASE_URL:-http://gateway:8080}
      NEXT_PUBLIC_INSURETECH_API_BASE_URL: ${B2B_PORTAL_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:8081"
    depends_on:
      - gateway
    restart: unless-stopped



