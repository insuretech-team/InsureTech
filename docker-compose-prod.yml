  authn:
    image: insuretech-authn
    build:
      context: .
      dockerfile: backend/infra/docker/authn/Dockerfile
    container_name: insuretech-authn
    profiles: ["authn", "full"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # gRPC ports ΓÇö localhost only, gateway reaches authn via Docker network (authn:50060)
    ports:
      - "127.0.0.1:50060:50060"
      - "127.0.0.1:50061:50061"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=3 http://localhost:50061/healthz >/dev/null 2>&1 || cat /proc/net/tcp 2>/dev/null | awk '{print $2}' | grep -qi ':C38C'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  authz:
    image: insuretech-authz
    build:
      context: .
      dockerfile: backend/infra/docker/authz/Dockerfile
    container_name: insuretech-authz
    profiles: ["authz", "full"]
    env_file:
      - .env
    environment:
      KAFKA_BROKERS: "kafka:9092"
    # gRPC ports ΓÇö localhost only, gateway reaches authz via Docker network (authz:50070)
    ports:
      - "127.0.0.1:50070:50070"
      - "127.0.0.1:50071:50071"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=3 http://localhost:50071/healthz >/dev/null 2>&1 || cat /proc/net/tcp 2>/dev/null | awk '{print $2}' | grep -qi ':C396'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  gateway:
    image: insuretech-gateway
    build:
      context: .
      dockerfile: backend/infra/docker/gateway/Dockerfile
    container_name: insuretech-gateway
    profiles: ["gateway", "full"]
    env_file:
      - .env
    depends_on:
      authn:
        condition: service_healthy
      authz:
        condition: service_healthy
    # HTTP port ΓÇö localhost only on production. nginx proxies public traffic via 127.0.0.1:8080.
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

