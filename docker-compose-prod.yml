services:
  redis:
    image: redis:7-alpine
    container_name: insuretech-redis
    # Bind to localhost only ΓÇö Redis must NEVER be publicly accessible.
    # Containers on the same Docker network reach it via service name 'redis:6379'.
    # DO NOT change to 0.0.0.0 ΓÇö see DigitalOcean security report.
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--bind", "0.0.0.0", "--protected-mode", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: insuretech-kafka
    # Bind Kafka external listener to localhost only ΓÇö never expose to internet.
    # Internal services use INTERNAL://kafka:9092 within the Docker network.
    ports:
      - "127.0.0.1:9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  # ΓöÇΓöÇ db-migrate ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
  # Runs ONCE at startup. Migrates primary then backup DB (protoΓåÆSQLΓåÆseeders).
  # Exits 0 on success, 1 on failure. Gateway and microservices depend on this.
  # To run manually: docker compose run --rm db-migrate
  db-migrate:
    build:
      context: .
      dockerfile: backend/infra/docker/dbops/Dockerfile
    image: insuretech-dbops
    container_name: insuretech-db-migrate
    profiles: ["full"]
    env_file:
      - .env
    command: ["./dbops", "migrate", "--target=both"]
    restart: "no"

  # ΓöÇΓöÇ db-sidecar ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
  # Long-running companion: continuous primaryΓåÆbackup sync + auto-backup loop.
  # Does NOT run migrations. Starts after db-migrate completes successfully.
  # To run: docker compose --profile full up db-sidecar
  db-sidecar:
    build:
      context: .
      dockerfile: backend/infra/docker/dbops/Dockerfile
    image: insuretech-dbops
    container_name: insuretech-db-sidecar
    profiles: ["sidecar", "full"]
    env_file:
      - .env
    command: ["./dbops", "sidecar"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

