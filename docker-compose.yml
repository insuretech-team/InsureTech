services:
  redis:
    image: redis:7-alpine
    container_name: insuretech-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: insuretech-kafka
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  # ── db-migrate ────────────────────────────────────────────────────────────
  # Runs ONCE at startup. Migrates primary then backup DB (proto→SQL→seeders).
  # Exits 0 on success, 1 on failure. Gateway and microservices depend on this.
  # To run manually: docker compose run --rm db-migrate
  db-migrate:
    image: golang:1.24-alpine
    container_name: insuretech-db-migrate
    profiles: ["full"]
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - .env
    command: >
      sh -lc "go run ./backend/inscore/cmd/dbops/main.go migrate --target=both"
    restart: "no"

  # ── db-sidecar ────────────────────────────────────────────────────────────
  # Long-running companion: continuous primary→backup sync + auto-backup loop.
  # Does NOT run migrations. Starts after db-migrate completes successfully.
  # To run: docker compose --profile full up db-sidecar
  db-sidecar:
    image: golang:1.24-alpine
    container_name: insuretech-db-sidecar
    profiles: ["sidecar", "full"]
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - .env
    command: >
      sh -lc "go run ./backend/inscore/cmd/dbops/main.go sidecar"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  tenant:
    build:
      context: .
      dockerfile: backend/infra/docker/tenant/Dockerfile
    container_name: insuretech-tenant
    profiles: ["tenant", "full"]
    env_file:
      - .env
    ports:
      - "50050:50050"
      - "50051:50051"
    restart: unless-stopped

  authn:
    build:
      context: .
      dockerfile: backend/infra/docker/authn/Dockerfile
    container_name: insuretech-authn
    profiles: ["authn", "full"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
