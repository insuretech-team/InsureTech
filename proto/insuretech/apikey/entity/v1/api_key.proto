syntax = "proto3";

package insuretech.apikey.entity.v1;

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/security.proto";
import "insuretech/common/v1/db.proto";
import "insuretech/common/v1/types.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/apikey/entity/v1;apikeyv1";

// API Key entity for insurer/partner authentication
message ApiKey {
  option (insuretech.common.v1.table) = {
    table_name: "api_keys"
    schema_name: "authn_schema"
    migration_order: 65
    is_table: true
    soft_delete: true
    audit_fields: true
    comment: "API keys for insurer and partner authentication"
  };
  
  string id = 1 [(insuretech.common.v1.column) = {
    column_name: "api_key_id"
    sql_type: "UUID"
    primary_key: true
    not_null: true
    default_value: "gen_random_uuid()"
  }];
  // @inject_tag: gorm:"primaryKey;column:api_key_id;not null"
  
  string key_hash = 2 [(insuretech.common.v1.column) = {
    column_name: "key_hash"
    sql_type: "VARCHAR(255)"
    not_null: true
    unique: true
    index: {
      index_name: "idx_api_keys_key_hash_unique"
      index_type: INDEX_TYPE_BTREE
      unique: true
    }
    comment: "SHA-256 hash of API key"
  },
    (insuretech.common.v1.sensitive) = true,
    (insuretech.common.v1.log_redacted) = true,
    (insuretech.common.v1.data_purpose) = "API authentication"
  ];
  // @inject_tag: gorm:"column:key_hash;not null"
  
  string name = 3 [(insuretech.common.v1.column) = {
    column_name: "name"
    sql_type: "VARCHAR(255)"
    not_null: true
    comment: "Human-readable key name"
  }];
  // @inject_tag: gorm:"column:name;not null"
  
  ApiKeyOwnerType owner_type = 4 [(insuretech.common.v1.column) = {
    column_name: "owner_type"
    sql_type: "VARCHAR(20)"
    not_null: true
    index: {
      index_name: "idx_api_keys_owner_type"
      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:owner_type;not null;serializer:proto_enum"
  
  string owner_id = 5 [(insuretech.common.v1.column) = {
    column_name: "owner_id"
    sql_type: "UUID"
    not_null: true
    index: {
      index_name: "idx_api_keys_owner_id"
      index_type: INDEX_TYPE_BTREE
    }
    comment: "FK to insurers.id or partners.partner_id based on owner_type"
  }];
  // @inject_tag: gorm:"column:owner_id;not null"
  
  repeated string scopes = 6 [(insuretech.common.v1.column) = {
    column_name: "scopes"
    sql_type: "TEXT[]"
  // @inject_tag: gorm:"column:scopes"
    not_null: true
    comment: "Access scopes: policy:read, policy:write, claim:read, etc."
  }];
  
  ApiKeyStatus status = 7 [(insuretech.common.v1.column) = {
    column_name: "status"
    sql_type: "VARCHAR(20)"
    not_null: true
    default_value: "'ACTIVE'"
    index: {
      index_name: "idx_api_keys_status"
      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:status;not null;serializer:proto_enum"
  
  int32 rate_limit_per_minute = 8 [(insuretech.common.v1.column) = {
    column_name: "rate_limit_per_minute"
    sql_type: "INTEGER"
    not_null: true
    default_value: "60"
    comment: "Max requests per minute"
  }];
  // @inject_tag: gorm:"column:rate_limit_per_minute;not null"
  
  google.protobuf.Timestamp expires_at = 9 [(insuretech.common.v1.column) = {
    column_name: "expires_at"
    sql_type: "TIMESTAMPTZ"
    index: {
      index_name: "idx_api_keys_expires_at"
      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:expires_at;serializer:proto_timestamp"
  
  google.protobuf.Timestamp last_used_at = 10 [(insuretech.common.v1.column) = {
    column_name: "last_used_at"
    sql_type: "TIMESTAMPTZ"
  }];
  // @inject_tag: gorm:"column:last_used_at;serializer:proto_timestamp"
  
  repeated string ip_whitelist = 11 [(insuretech.common.v1.column) = {
    column_name: "ip_whitelist"
    sql_type: "TEXT[]"
  // @inject_tag: gorm:"column:ip_whitelist"
    comment: "Allowed IP addresses (empty = all)"
  }];
  
  insuretech.common.v1.AuditInfo audit_info = 12 [
    (insuretech.common.v1.column) = {
      column_name: "audit_info"
      sql_type: "JSONB"
      not_null: true
      default_value: "'{}'::jsonb"
      is_json: true
      comment: "Audit trail stored as JSON"
    }
  ];
  // @inject_tag: gorm:"column:audit_info;not null"
}

enum ApiKeyOwnerType {
  API_KEY_OWNER_TYPE_UNSPECIFIED = 0;
  API_KEY_OWNER_TYPE_INSURER = 1;
  API_KEY_OWNER_TYPE_PARTNER = 2;
  API_KEY_OWNER_TYPE_INTERNAL = 3;
}

enum ApiKeyStatus {
  API_KEY_STATUS_UNSPECIFIED = 0;
  API_KEY_STATUS_ACTIVE = 1;
  API_KEY_STATUS_EXPIRED = 2;
  API_KEY_STATUS_REVOKED = 3;
  API_KEY_STATUS_SUSPENDED = 4;
  API_KEY_STATUS_ROTATING = 5; // Key is being rotated (grace period)
}


