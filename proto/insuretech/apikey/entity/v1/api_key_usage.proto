      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:status_code;not null"
  
  int32 response_time_ms = 6 [(insuretech.common.v1.column) = {
    column_name: "response_time_ms"
    sql_type: "INTEGER"
