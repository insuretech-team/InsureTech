      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:request_ip"
  
  string user_agent = 8 [(insuretech.common.v1.column) = {
    column_name: "user_agent"
    sql_type: "TEXT"
