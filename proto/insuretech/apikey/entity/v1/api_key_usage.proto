      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:endpoint;not null"
  
  string http_method = 4 [(insuretech.common.v1.column) = {
    column_name: "http_method"
    sql_type: "VARCHAR(10)"
    not_null: true
  }];
  // @inject_tag: gorm:"column:http_method;not null"
  
  int32 status_code = 5 [(insuretech.common.v1.column) = {
    column_name: "status_code"
    sql_type: "INTEGER"
