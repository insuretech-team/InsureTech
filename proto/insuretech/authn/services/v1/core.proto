message RotateAPIKeyResponse {
  string new_key_id = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string raw_key = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ]; // New key - shown ONCE
