  google.protobuf.Timestamp old_key_expires_at = 4
      [ (google.api.field_behavior) = OUTPUT_ONLY ]; // When old key will be revoked
  string message = 5 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 6
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

