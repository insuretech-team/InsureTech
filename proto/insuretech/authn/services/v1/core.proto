// ── TOTP / 2FA Messages ──

message EnableTOTPRequest {
  string user_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}
message EnableTOTPResponse {
  string totp_secret = 1;        // base32 secret for app setup
  string provisioning_uri = 2;   // otpauth:// URI for QR code
  insuretech.common.v1.Error error = 3;
}
message VerifyTOTPRequest {
  string user_id = 1 [ (google.api.field_behavior) = REQUIRED ];
  string totp_code = 2 [ (google.api.field_behavior) = REQUIRED ]; // 6-digit code
  // mfa_session_token: returned by Login when mfa_required=true.
  // If provided, VerifyTOTP will issue full session tokens after TOTP validation.
  string mfa_session_token = 3 [(google.api.field_behavior) = OPTIONAL];
}
message VerifyTOTPResponse {
  bool verified = 1;
  string message = 2;
  insuretech.common.v1.Error error = 3;
  // Session tokens — only populated when mfa_session_token was provided in request.
  // After MFA verification the client receives full session tokens identical to LoginResponse.
  string access_token            = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  string refresh_token           = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
  string session_token           = 6 [(google.api.field_behavior) = OUTPUT_ONLY]; // server-side web session cookie
  string csrf_token              = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
  string session_id              = 8 [(google.api.field_behavior) = OUTPUT_ONLY];
  string session_type            = 9 [(google.api.field_behavior) = OUTPUT_ONLY]; // JWT | SERVER_SIDE
  int32  access_token_expires_in = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
  int32  refresh_token_expires_in = 11 [(google.api.field_behavior) = OUTPUT_ONLY];
}
message DisableTOTPRequest {
  string user_id = 1 [ (google.api.field_behavior) = REQUIRED ];
  string totp_code = 2 [ (google.api.field_behavior) = REQUIRED ]; // confirm before disabling
}
message DisableTOTPResponse {
  string message = 1;
  insuretech.common.v1.Error error = 2;
}

