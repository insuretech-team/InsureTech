syntax = "proto3";

package insuretech.b2b.entity.v1;

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/b2b/entity/v1;b2bv1";
option csharp_namespace = "Insuretech.B2b.Entity.V1";

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/db.proto";
import "insuretech/common/v1/types.proto";

// PurchaseOrder represents a business purchase request for an insurance product
// plan.
message PurchaseOrder {
  option (insuretech.common.v1.table) = {
    table_name : "purchase_orders"
    schema_name : "b2b_schema"
    migration_order : 93
    is_table : true
    comment : "B2B purchase orders for product enrollment"
    soft_delete : true
    audit_fields : true
    enable_rls : true
  };

  string purchase_order_id = 1 [ (insuretech.common.v1.column) = {
    column_name : "purchase_order_id"
    sql_type : "UUID"
    primary_key : true
    not_null : true
    default_value : "gen_random_uuid()"
  } ];
  // @inject_tag: gorm:"primaryKey;column:purchase_order_id;not null"

  string purchase_order_number = 2 [ (insuretech.common.v1.column) = {
    column_name : "purchase_order_number"
    sql_type : "VARCHAR(100)"
    not_null : true
    unique : true
  } ];
  // @inject_tag: gorm:"column:purchase_order_number;not null"

  string business_id = 3
      [ (insuretech.common.v1.column) =
            {column_name : "business_id" sql_type : "UUID" not_null : true} ];
  // @inject_tag: gorm:"column:business_id;not null"

  string department_id = 4
      [ (insuretech.common.v1.column) =
            {column_name : "department_id" sql_type : "UUID" not_null : true} ];
  // @inject_tag: gorm:"column:department_id;not null"

  string product_id = 5 [ (insuretech.common.v1.column) = {
    column_name : "product_id"
    sql_type : "UUID"
    not_null : true
    comment : "Insurance product being purchased"
  } ];
  // @inject_tag: gorm:"column:product_id;not null"

  string plan_id = 6 [ (insuretech.common.v1.column) = {
    column_name : "plan_id"
    sql_type : "UUID"
    not_null : true
    comment : "Insurance plan selected for this purchase order"
  } ];
  // @inject_tag: gorm:"column:plan_id;not null"

  insuretech.common.v1.InsuranceType insurance_category = 7
      [ (insuretech.common.v1.column) = {
        column_name : "insurance_category"
        sql_type : "VARCHAR(50)"
        not_null : true
      } ];
  // @inject_tag: gorm:"column:insurance_category;not null"

  int32 employee_count = 8 [ (insuretech.common.v1.column) = {
    column_name : "employee_count"
    sql_type : "INTEGER"
    not_null : true
    default_value : "0"
  } ];
  // @inject_tag: gorm:"column:employee_count;not null"

  int32 number_of_dependents = 9 [ (insuretech.common.v1.column) = {
    column_name : "number_of_dependents"
    sql_type : "INTEGER"
    not_null : true
    default_value : "0"
  } ];
  // @inject_tag: gorm:"column:number_of_dependents;not null"

  insuretech.common.v1.Money coverage_amount = 10;
  insuretech.common.v1.Money estimated_premium = 11;

  PurchaseOrderStatus status = 12 [ (insuretech.common.v1.column) = {
    column_name : "status"
    sql_type : "VARCHAR(50)"
    not_null : true
    default_value : "'SUBMITTED'"
  } ];
  // @inject_tag: gorm:"column:status;not null;serializer:proto_enum"

  string requested_by = 13 [ (insuretech.common.v1.column) = {
    column_name : "requested_by"
    sql_type : "UUID"
    comment : "Requester user ID"
  } ];
  // @inject_tag: gorm:"column:requested_by"

  string notes = 14 [
    (insuretech.common.v1.column) = {column_name : "notes" sql_type : "TEXT"}
  ];
  // @inject_tag: gorm:"column:notes"

  google.protobuf.Timestamp created_at = 15 [ (insuretech.common.v1.column) = {
    column_name : "created_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
    exclude_from_update : true
  } ];
  // @inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp updated_at = 16 [ (insuretech.common.v1.column) = {
    column_name : "updated_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
  } ];
  // @inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp deleted_at = 17 [ (insuretech.common.v1.column) = {
    column_name : "deleted_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    comment : "Soft delete timestamp"
  } ];
  // @inject_tag: gorm:"column:deleted_at;serializer:proto_timestamp"
}

enum PurchaseOrderStatus {
  PURCHASE_ORDER_STATUS_UNSPECIFIED = 0;
  PURCHASE_ORDER_STATUS_DRAFT = 1;
  PURCHASE_ORDER_STATUS_SUBMITTED = 2;
  PURCHASE_ORDER_STATUS_APPROVED = 3;
  PURCHASE_ORDER_STATUS_FULFILLED = 4;
  PURCHASE_ORDER_STATUS_REJECTED = 5;
}
