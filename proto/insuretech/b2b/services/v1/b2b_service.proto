}

message UpdateDepartmentResponse {
  insuretech.b2b.entity.v1.Department department = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string message = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message DeleteDepartmentRequest {
  string department_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message DeleteDepartmentResponse {
  string message = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
