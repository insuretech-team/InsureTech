  int32 total_count = 3 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 4
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message GetDepartmentRequest {
  string department_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message GetDepartmentResponse {
  insuretech.b2b.entity.v1.Department department = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message CreateDepartmentRequest {
