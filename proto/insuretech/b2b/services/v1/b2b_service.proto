message DeleteOrganisationRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message DeleteOrganisationResponse {
  string message = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message ListOrgMembersRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message ListOrgMembersResponse {
  repeated insuretech.b2b.entity.v1.OrgMember members = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message AddOrgMemberRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
  string user_id = 2 [ (google.api.field_behavior) = REQUIRED ];
  insuretech.b2b.entity.v1.OrgMemberRole role = 3
      [ (google.api.field_behavior) = REQUIRED ];
}

message AddOrgMemberResponse {
  insuretech.b2b.entity.v1.OrgMember member = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string message = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message RemoveOrgMemberRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
  string member_id = 2 [ (google.api.field_behavior) = REQUIRED ];
}

message RemoveOrgMemberResponse {
  string message = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message AssignOrgAdminRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
  string member_id = 2 [ (google.api.field_behavior) = REQUIRED ];
}

message AssignOrgAdminResponse {
  insuretech.b2b.entity.v1.OrgMember member = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string message = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

// ResolveMyOrganisation — called server-side (gateway) to resolve business_id
// from user_id. Returns the organisation_id for the authenticated user (via
// OrgMember lookup).
message ResolveMyOrganisationRequest {
  // user_id extracted from the validated session token (set by gateway, NOT
  // from client)
  string user_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message ResolveMyOrganisationResponse {
  string organisation_id = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string organisation_name = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.b2b.entity.v1.OrgMemberRole role = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 4
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

