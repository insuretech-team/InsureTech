}

// ─── EMPLOYEE MESSAGES ───────────────────────────────────────────────────────

message ListEmployeesRequest {
  int32 page_size = 1 [ (google.api.field_behavior) = OPTIONAL ];
  string page_token = 2 [ (google.api.field_behavior) = OPTIONAL ];
  string department_id = 3 [ (google.api.field_behavior) = OPTIONAL ];
  // business_id injected server-side from session; do NOT set from client.
  string business_id = 4 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.b2b.entity.v1.EmployeeStatus status = 5
      [ (google.api.field_behavior) = OPTIONAL ];
}

message ListEmployeesResponse {
  repeated EmployeeView employees = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string next_page_token = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  int32 total_count = 3 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 4
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message GetEmployeeRequest {
  string employee_uuid = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message GetEmployeeResponse {
  EmployeeView employee = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message CreateEmployeeRequest {
  string name = 1 [ (google.api.field_behavior) = REQUIRED ];
  string employee_id = 2 [ (google.api.field_behavior) = REQUIRED ];
  string department_id = 3 [ (google.api.field_behavior) = REQUIRED ];
  // business_id injected server-side; do NOT pass from frontend.
  string business_id = 4 [ (google.api.field_behavior) = OPTIONAL ];

  insuretech.common.v1.InsuranceType insurance_category = 5
      [ (google.api.field_behavior) = OPTIONAL ];
  string assigned_plan_id = 6 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.common.v1.Money coverage_amount = 7
      [ (google.api.field_behavior) = OPTIONAL ];
  int32 number_of_dependent = 8 [ (google.api.field_behavior) = OPTIONAL ];

  // New PII fields
  string email = 9 [ (google.api.field_behavior) = OPTIONAL ];
  string mobile_number = 10 [ (google.api.field_behavior) = OPTIONAL ];
  string date_of_birth = 11 [ (google.api.field_behavior) = OPTIONAL ];
  string date_of_joining = 12 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.b2b.entity.v1.EmployeeGender gender = 13
      [ (google.api.field_behavior) = OPTIONAL ];
}

message CreateEmployeeResponse {
  EmployeeView employee = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string message = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message UpdateEmployeeRequest {
  string employee_uuid = 1 [ (google.api.field_behavior) = REQUIRED ];

  // All fields are optional — only non-empty values are applied (partial
  // update).
  string name = 2 [ (google.api.field_behavior) = OPTIONAL ];
  string department_id = 3 [ (google.api.field_behavior) = OPTIONAL ];
  string email = 4 [ (google.api.field_behavior) = OPTIONAL ];
  string mobile_number = 5 [ (google.api.field_behavior) = OPTIONAL ];
  string date_of_birth = 6 [ (google.api.field_behavior) = OPTIONAL ];
  string date_of_joining = 7 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.b2b.entity.v1.EmployeeGender gender = 8
      [ (google.api.field_behavior) = OPTIONAL ];

  insuretech.common.v1.InsuranceType insurance_category = 9
      [ (google.api.field_behavior) = OPTIONAL ];
  string assigned_plan_id = 10 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.common.v1.Money coverage_amount = 11
      [ (google.api.field_behavior) = OPTIONAL ];
  int32 number_of_dependent = 12 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.b2b.entity.v1.EmployeeStatus status = 13
      [ (google.api.field_behavior) = OPTIONAL ];
}

message UpdateEmployeeResponse {
  EmployeeView employee = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string message = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message DeleteEmployeeRequest {
  string employee_uuid = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message DeleteEmployeeResponse {
  string message = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

