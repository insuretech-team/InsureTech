  string industry = 4 [ (google.api.field_behavior) = OPTIONAL ];
  string contact_email = 5 [ (google.api.field_behavior) = OPTIONAL ];
  string contact_phone = 6 [ (google.api.field_behavior) = OPTIONAL ];
  string address = 7 [ (google.api.field_behavior) = OPTIONAL ];
}

message CreateOrganisationResponse {
  insuretech.b2b.entity.v1.Organisation organisation = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string message = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 3
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message GetOrganisationRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
}

message GetOrganisationResponse {
  insuretech.b2b.entity.v1.Organisation organisation = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 2
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message ListOrganisationsRequest {
  int32 page_size = 1 [ (google.api.field_behavior) = OPTIONAL ];
  string page_token = 2 [ (google.api.field_behavior) = OPTIONAL ];
  string tenant_id = 3 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.b2b.entity.v1.OrganisationStatus status = 4
      [ (google.api.field_behavior) = OPTIONAL ];
}

message ListOrganisationsResponse {
  repeated insuretech.b2b.entity.v1.Organisation organisations = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string next_page_token = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  int32 total_count = 3 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Error error = 4
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message UpdateOrganisationRequest {
  string organisation_id = 1 [ (google.api.field_behavior) = REQUIRED ];
  string name = 2 [ (google.api.field_behavior) = OPTIONAL ];
  string industry = 3 [ (google.api.field_behavior) = OPTIONAL ];
  string contact_email = 4 [ (google.api.field_behavior) = OPTIONAL ];
  string contact_phone = 5 [ (google.api.field_behavior) = OPTIONAL ];
  string address = 6 [ (google.api.field_behavior) = OPTIONAL ];
  insuretech.b2b.entity.v1.OrganisationStatus status = 7
      [ (google.api.field_behavior) = OPTIONAL ];
