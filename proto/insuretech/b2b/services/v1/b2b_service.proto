syntax = "proto3";

package insuretech.b2b.services.v1;

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/b2b/services/v1;b2bservicev1";
option csharp_namespace = "Insuretech.B2b.Services.V1";

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "insuretech/b2b/entity/v1/department.proto";
import "insuretech/b2b/entity/v1/employee.proto";
import "insuretech/b2b/entity/v1/organisation.proto";
import "insuretech/b2b/entity/v1/purchase_order.proto";
import "insuretech/common/v1/error.proto";
import "insuretech/common/v1/types.proto";

// B2BService manages all B2B portal domain operations.
// business_id in all requests is the organisation_id from
// b2b_schema.organisations. It is NEVER passed from the frontend — it is
// resolved server-side from the authenticated session (x-business-id gRPC
// metadata set by the REST gateway after reading the session cookie and looking
// up the OrgMember record).
service B2BService {

  // ─── ORGANISATION ────────────────────────────────────────────────────────

  // Create a new organisation (SuperAdmin only).
  rpc CreateOrganisation(CreateOrganisationRequest)
      returns (CreateOrganisationResponse) {
    option (google.api.http) = {
      post : "/v1/b2b/organisations"
      body : "*"
    };
  }

  // Get a single organisation by ID.
  rpc GetOrganisation(GetOrganisationRequest)
      returns (GetOrganisationResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/organisations/{organisation_id}"
    };
  }

  // List all organisations (SuperAdmin: all; BizAdmin: own only).
  rpc ListOrganisations(ListOrganisationsRequest)
      returns (ListOrganisationsResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/organisations"
    };
  }

  // Update an organisation's profile.
  rpc UpdateOrganisation(UpdateOrganisationRequest)
      returns (UpdateOrganisationResponse) {
    option (google.api.http) = {
      patch : "/v1/b2b/organisations/{organisation_id}"
      body : "*"
    };
  }

  // Soft-delete an organisation and revoke its memberships.
  rpc DeleteOrganisation(DeleteOrganisationRequest)
      returns (DeleteOrganisationResponse) {
    option (google.api.http) = {
      delete : "/v1/b2b/organisations/{organisation_id}"
    };
  }

  // List members for an organisation.
  rpc ListOrgMembers(ListOrgMembersRequest) returns (ListOrgMembersResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/organisations/{organisation_id}/members"
    };
  }

  // Add a platform user as an OrgMember.
  rpc AddOrgMember(AddOrgMemberRequest) returns (AddOrgMemberResponse) {
    option (google.api.http) = {
      post : "/v1/b2b/organisations/{organisation_id}/members"
      body : "*"
    };
  }

  // Assign a platform user as an OrgAdmin.
  rpc AssignOrgAdmin(AssignOrgAdminRequest) returns (AssignOrgAdminResponse) {
    option (google.api.http) = {
      post : "/v1/b2b/organisations/{organisation_id}/admins"
      body : "*"
    };
  }

  // Remove an OrgMember from the organisation.
  rpc RemoveOrgMember(RemoveOrgMemberRequest)
      returns (RemoveOrgMemberResponse) {
    option (google.api.http) = {
      delete : "/v1/b2b/organisations/{organisation_id}/members/{member_id}"
    };
  }

  // ResolveMyOrganisation — called server-side (gateway) to resolve business_id
  rpc ResolveMyOrganisation(ResolveMyOrganisationRequest)
      returns (ResolveMyOrganisationResponse) {}

  // ─── DEPARTMENTS ─────────────────────────────────────────────────────────

  // List departments for the authenticated organisation.
  rpc ListDepartments(ListDepartmentsRequest)
      returns (ListDepartmentsResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/departments"
    };
  }

  // Get a single department.
  rpc GetDepartment(GetDepartmentRequest) returns (GetDepartmentResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/departments/{department_id}"
    };
  }

  // Create a new department.
  rpc CreateDepartment(CreateDepartmentRequest)
      returns (CreateDepartmentResponse) {
    option (google.api.http) = {
      post : "/v1/b2b/departments"
      body : "*"
    };
  }

  // Update a department's name.
  rpc UpdateDepartment(UpdateDepartmentRequest)
      returns (UpdateDepartmentResponse) {
    option (google.api.http) = {
      patch : "/v1/b2b/departments/{department_id}"
      body : "*"
    };
  }

  // Soft-delete a department (only if no active employees).
  rpc DeleteDepartment(DeleteDepartmentRequest)
      returns (DeleteDepartmentResponse) {
    option (google.api.http) = {
      delete : "/v1/b2b/departments/{department_id}"
    };
  }

  // ─── EMPLOYEES ───────────────────────────────────────────────────────────

  // List employees for the authenticated organisation.
  rpc ListEmployees(ListEmployeesRequest) returns (ListEmployeesResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/employees"
    };
  }

  // Get a single employee by employee_uuid.
  rpc GetEmployee(GetEmployeeRequest) returns (GetEmployeeResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/employees/{employee_uuid}"
    };
  }

  // Create a new employee.
  rpc CreateEmployee(CreateEmployeeRequest) returns (CreateEmployeeResponse) {
    option (google.api.http) = {
      post : "/v1/b2b/employees"
      body : "*"
    };
  }

  // Update an existing employee's details.
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (UpdateEmployeeResponse) {
    option (google.api.http) = {
      patch : "/v1/b2b/employees/{employee_uuid}"
      body : "*"
    };
  }

  // Soft-delete an employee record.
  rpc DeleteEmployee(DeleteEmployeeRequest) returns (DeleteEmployeeResponse) {
    option (google.api.http) = {
      delete : "/v1/b2b/employees/{employee_uuid}"
    };
  }

  // ─── PURCHASE ORDERS ─────────────────────────────────────────────────────

  // List purchasable product plans for purchase orders.
  rpc ListPurchaseOrderCatalog(ListPurchaseOrderCatalogRequest)
      returns (ListPurchaseOrderCatalogResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/purchase-orders/catalog"
    };
  }

  // List purchase orders for the authenticated organisation.
  rpc ListPurchaseOrders(ListPurchaseOrdersRequest)
      returns (ListPurchaseOrdersResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/purchase-orders"
    };
  }

  // Get a single purchase order.
  rpc GetPurchaseOrder(GetPurchaseOrderRequest)
      returns (GetPurchaseOrderResponse) {
    option (google.api.http) = {
      get : "/v1/b2b/purchase-orders/{purchase_order_id}"
    };
  }

  // Create a purchase order for a product plan.
  rpc CreatePurchaseOrder(CreatePurchaseOrderRequest)
      returns (CreatePurchaseOrderResponse) {
    option (google.api.http) = {
      post : "/v1/b2b/purchase-orders"
      body : "*"
    };
  }
}

// ─── VIEW TYPES ──────────────────────────────────────────────────────────────

message EmployeeView {
  insuretech.b2b.entity.v1.Employee employee = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string department_name = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string assigned_plan_name = 3 [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message DepartmentView {
  insuretech.b2b.entity.v1.Department department = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string organisation_name = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message PurchaseOrderView {
  insuretech.b2b.entity.v1.PurchaseOrder purchase_order = 1
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string department_name = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string product_name = 3 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string plan_name = 4 [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

message PurchaseOrderCatalogItem {
  string product_id = 1 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string product_name = 2 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string plan_id = 3 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  string plan_name = 4 [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.InsuranceType insurance_category = 5
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
  insuretech.common.v1.Money premium_amount = 6
      [ (google.api.field_behavior) = OUTPUT_ONLY ];
}

