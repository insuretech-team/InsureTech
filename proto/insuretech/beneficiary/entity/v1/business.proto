// Primary Contact Information
message PrimaryContact {
  string name = 1;
  string email = 2;
  string phone = 3;
  string department = 4;
}

enum BusinessType {
  BUSINESS_TYPE_UNSPECIFIED = 0;
  BUSINESS_TYPE_SOLE_PROPRIETORSHIP = 1;
  BUSINESS_TYPE_PARTNERSHIP = 2;
  BUSINESS_TYPE_PRIVATE_LIMITED = 3;
  BUSINESS_TYPE_PUBLIC_LIMITED = 4;
  BUSINESS_TYPE_NGO = 5;
  BUSINESS_TYPE_GOVERNMENT = 6;
}
