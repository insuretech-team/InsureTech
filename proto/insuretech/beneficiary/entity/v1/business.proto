syntax = "proto3";

package insuretech.beneficiary.entity.v1;

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/db.proto";
import "insuretech/common/v1/types.proto";
import "insuretech/common/v1/security.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/beneficiary/entity/v1;beneficiaryv1";

