  // Dashboard metrics (cached)
  int32 total_employees_covered = 25 [ (insuretech.common.v1.column) = {
    column_name : "total_employees_covered"
    sql_type : "INTEGER"
    not_null : true
    default_value : "0"
    comment : "Cached count of employees with active coverage"
  } ];
  // @inject_tag: gorm:"column:total_employees_covered;not null"

  int32 active_policies_count = 26 [ (insuretech.common.v1.column) = {
