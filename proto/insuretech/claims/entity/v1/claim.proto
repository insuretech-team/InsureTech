  // @inject_tag: gorm:"column:claimed_amount;not null"

  insuretech.common.v1.Money approved_amount = 8
      [ (insuretech.common.v1.column) = {
        column_name : "approved_amount"
        sql_type : "BIGINT"
        check_constraint : "approved_amount >= 0"
