  // @inject_tag: gorm:"column:processor_notes"

  // Currency companion fields for Money types (flattened storage)
  string claimed_currency = 10001 [ (insuretech.common.v1.column) = {
    column_name : "claimed_currency"
    sql_type : "VARCHAR(3)"
