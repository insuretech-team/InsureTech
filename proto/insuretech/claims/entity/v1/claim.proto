  } ];
  // @inject_tag: gorm:"column:incident_description;not null"

  google.protobuf.Timestamp submitted_at = 12
      [ (insuretech.common.v1.column) = {
        column_name : "submitted_at"
        sql_type : "TIMESTAMP WITH TIME ZONE"
