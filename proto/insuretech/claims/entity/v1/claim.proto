// Claim represents an insurance claim
// Maps to 'claims' table in claims_schema
message Claim {
  option (insuretech.common.v1.table) = {
    table_name : "claims"
    schema_name : "insurance_schema"
    migration_order : 46
    is_table : true
    comment : "Insurance claims with status tracking and approval workflow"
    soft_delete : true
    audit_fields : true
    enable_rls : true
    partition_strategy : PARTITION_STRATEGY_RANGE_MONTH
    partition_column : "created_at"
  };

  string claim_id = 1 [ (insuretech.common.v1.column) = {
    column_name : "claim_id"
    sql_type : "UUID"
    primary_key : true
    not_null : true
    default_value : "gen_random_uuid()"
    comment : "Primary key - Claim UUID"
  } ];
  // @inject_tag: gorm:"primaryKey;column:claim_id;not null"

  string claim_number = 2 [ (insuretech.common.v1.column) = {
    column_name : "claim_number"
    sql_type : "VARCHAR(50)"
    not_null : true
    unique : true
    check_constraint : "claim_number ~ '^CLM-[0-9]{4}-[A-Z0-9]{4}-[0-9]{6}$'"
  // @inject_tag: gorm:"column:claim_number;not null"
    comment : "Unique claim number format: CLM-YYYY-XXXX-NNNNNN"
    index : {
      index_name : "idx_claims_claim_number"
      index_type : INDEX_TYPE_BTREE
      unique : true
    }
  } ];

  string policy_id = 3 [ (insuretech.common.v1.column) = {
    column_name : "policy_id"
    sql_type : "UUID"
    not_null : true
    comment : "Foreign key to policies table"
    foreign_key : {
      references_table : "policies"
      references_column : "policy_id"
      references_schema : "insurance_schema"
      on_delete : REFERENTIAL_ACTION_RESTRICT
      on_update : REFERENTIAL_ACTION_CASCADE
      constraint_name : "fk_claims_policy_id"
    }
    index : {index_name : "idx_claims_policy_id" index_type : INDEX_TYPE_BTREE}
  } ];
  // @inject_tag: gorm:"column:policy_id;not null"

  string customer_id = 4 [ (insuretech.common.v1.column) = {
    column_name : "customer_id"
    sql_type : "UUID"
    not_null : true
    comment : "Foreign key to users table (claimant)"
    foreign_key : {
      references_table : "users"
      references_column : "user_id"
      references_schema : "authn_schema"
      on_delete : REFERENTIAL_ACTION_RESTRICT
      on_update : REFERENTIAL_ACTION_CASCADE
