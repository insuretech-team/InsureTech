  // @inject_tag: gorm:"column:approved_at;serializer:proto_timestamp"

  google.protobuf.Timestamp settled_at = 14 [ (insuretech.common.v1.column) = {
    column_name : "settled_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    comment : "Claim settlement timestamp"
  } ];
  // @inject_tag: gorm:"column:settled_at;serializer:proto_timestamp"

  google.protobuf.Timestamp created_at = 15 [ (insuretech.common.v1.column) = {
    column_name : "created_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
    exclude_from_update : true
  } ];
  // @inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp updated_at = 16 [ (insuretech.common.v1.column) = {
    column_name : "updated_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
  } ];
  // @inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"

  string rejection_reason = 17 [ (insuretech.common.v1.column) = {
    column_name : "rejection_reason"
    sql_type : "TEXT"
    comment : "Reason for rejection (if rejected)"
  } ];
  // @inject_tag: gorm:"column:rejection_reason"

  google.protobuf.Timestamp deleted_at = 18 [ (insuretech.common.v1.column) = {
    column_name : "deleted_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    comment : "Soft delete timestamp"
  } ];
  // @inject_tag: gorm:"column:deleted_at;serializer:proto_timestamp"

  // Related entities stored in separate tables
  repeated ClaimDocument documents = 19;
  repeated ClaimApproval approvals = 20;
  FraudCheckResult fraud_check = 21;

  string place_of_incident = 22 [ (insuretech.common.v1.column) = {
