enum ClaimStatus {
  CLAIM_STATUS_UNSPECIFIED = 0;
  CLAIM_STATUS_SUBMITTED = 1;         // Initial submission
  CLAIM_STATUS_UNDER_REVIEW = 2;      // Being reviewed
  CLAIM_STATUS_PENDING_DOCUMENTS = 3; // Awaiting documents
  CLAIM_STATUS_APPROVED = 4;          // Approved for payment
  CLAIM_STATUS_REJECTED = 5;          // Rejected
  CLAIM_STATUS_SETTLED = 6;           // Payment completed
  CLAIM_STATUS_DISPUTED = 7;          // Under dispute
}

enum ClaimType {
  CLAIM_TYPE_UNSPECIFIED = 0;
  CLAIM_TYPE_HEALTH_HOSPITALIZATION = 1;
  CLAIM_TYPE_HEALTH_SURGERY = 2;
  CLAIM_TYPE_MOTOR_ACCIDENT = 3;
  CLAIM_TYPE_MOTOR_THEFT = 4;
  CLAIM_TYPE_TRAVEL_MEDICAL = 5;
  CLAIM_TYPE_TRAVEL_BAGGAGE_LOSS = 6;
  CLAIM_TYPE_DEVICE_DAMAGE = 7;
  CLAIM_TYPE_DEVICE_THEFT = 8;
  CLAIM_TYPE_DEATH = 9;
}

enum ClaimProcessingType {
  CLAIM_PROCESSING_TYPE_UNSPECIFIED = 0;
  CLAIM_PROCESSING_TYPE_MANUAL = 1;
  CLAIM_PROCESSING_TYPE_AUTO_ADJUDICATED = 2;
  CLAIM_PROCESSING_TYPE_AI_ASSISTED = 3;
}

