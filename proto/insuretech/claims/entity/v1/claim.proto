      } ];
  // @inject_tag: gorm:"column:submitted_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp approved_at = 13 [ (insuretech.common.v1.column) = {
    column_name : "approved_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
