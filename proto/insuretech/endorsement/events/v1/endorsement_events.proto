syntax = "proto3";

package insuretech.endorsement.events.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/endorsement/events/v1;endorsementeventsv1";

// Kafka event: Endorsement requested
message EndorsementRequestedEvent {
  string event_id = 1;
  string endorsement_id = 2;
  string endorsement_number = 3;
  string policy_id = 4;
  string type = 5;
  string requested_by = 6;
  string correlation_id = 7;
  google.protobuf.Timestamp timestamp = 8;
}

// Kafka event: Endorsement approved
message EndorsementApprovedEvent {
  string event_id = 1;
  string endorsement_id = 2;
  string policy_id = 3;
  string type = 4;
  string approved_by = 5;
  string effective_date = 6;
  string correlation_id = 7;
  google.protobuf.Timestamp timestamp = 8;
}

// Kafka event: Endorsement rejected
message EndorsementRejectedEvent {
  string event_id = 1;
  string endorsement_id = 2;
  string policy_id = 3;
  string reason = 4;
  string correlation_id = 5;
  google.protobuf.Timestamp timestamp = 6;
}

// Kafka event: Endorsement applied to policy
message EndorsementAppliedEvent {
  string event_id = 1;
  string endorsement_id = 2;
  string policy_id = 3;
  string type = 4;
  string correlation_id = 5;
  google.protobuf.Timestamp timestamp = 6;
}

