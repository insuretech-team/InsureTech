  rpc GetClaim(GetClaimRequest) returns (GetClaimResponse);
  rpc UpdateClaim(UpdateClaimRequest) returns (UpdateClaimResponse);
  rpc DeleteClaim(DeleteClaimRequest) returns (google.protobuf.Empty);
