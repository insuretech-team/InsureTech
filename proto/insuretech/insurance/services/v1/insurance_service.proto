// Insurance Service - Generic CRUD for insurance_schema tables
service InsuranceService {
  // ========== PRODUCT CRUD ==========
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (google.protobuf.Empty);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);

  // ========== PRODUCT PLAN CRUD ==========
  rpc CreateProductPlan(CreateProductPlanRequest) returns (CreateProductPlanResponse);
  rpc GetProductPlan(GetProductPlanRequest) returns (GetProductPlanResponse);
  rpc ListProductPlans(ListProductPlansRequest) returns (ListProductPlansResponse);

  // ========== RIDER CRUD ==========
  rpc CreateRider(CreateRiderRequest) returns (CreateRiderResponse);
  rpc GetRider(GetRiderRequest) returns (GetRiderResponse);
  rpc ListRiders(ListRidersRequest) returns (ListRidersResponse);

  // ========== PRICING CONFIG CRUD ==========
  rpc CreatePricingConfig(CreatePricingConfigRequest) returns (CreatePricingConfigResponse);
  rpc GetPricingConfig(GetPricingConfigRequest) returns (GetPricingConfigResponse);

  // ========== POLICY CRUD ==========
