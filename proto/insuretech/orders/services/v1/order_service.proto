syntax = "proto3";

package insuretech.orders.services.v1;

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/orders/services/v1;orderservicev1";
option csharp_namespace = "Insuretech.Orders.Services.V1";

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "insuretech/orders/entity/v1/order.proto";
import "insuretech/common/v1/error.proto";
import "insuretech/common/v1/types.proto";

// OrderService manages the insurance purchase order lifecycle.
// Orders bridge the gap between an approved quotation and policy issuance,
// coordinating payment collection via the PaymentService.
service OrderService {

  // Create a new order from an approved quotation.
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {
    option (google.api.http) = {
      post: "/v1/orders"
      body: "*"
    };
  }

  // Get a single order by ID.
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{order_id}"
    };
  }

  // List orders with optional filters.
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      get: "/v1/orders"
    };
  }

  // Initiate payment for a pending order.
  // Calls PaymentService.InitiatePayment and returns the payment URL.
  rpc InitiatePayment(InitiatePaymentRequest) returns (InitiatePaymentResponse) {
    option (google.api.http) = {
      post: "/v1/orders/{order_id}:pay"
      body: "*"
    };
  }

  // Confirm payment for an order (called by payment gateway callback).
  // Transitions order to PAID and triggers policy issuance.
  rpc ConfirmPayment(ConfirmPaymentRequest) returns (ConfirmPaymentResponse) {
    option (google.api.http) = {
      post: "/v1/orders/{order_id}:confirm-payment"
      body: "*"
    };
  }

  // Cancel an order (only allowed before PAID or POLICY_ISSUED).
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (google.api.http) = {
      post: "/v1/orders/{order_id}:cancel"
      body: "*"
    };
  }

  // Get lightweight order status.
  rpc GetOrderStatus(GetOrderStatusRequest) returns (GetOrderStatusResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{order_id}/status"
    };
  }
}

// ─── VIEW TYPES ──────────────────────────────────────────────────────────────

message OrderView {
  insuretech.orders.entity.v1.Order order = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];
  string product_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string plan_name = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  string customer_name = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  string quotation_number = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── CREATE ORDER ────────────────────────────────────────────────────────────

message CreateOrderRequest {
  // ID of the approved quotation to convert into an order.
  string quotation_id = 1 [(google.api.field_behavior) = REQUIRED];
  // Customer placing the order (injected server-side from session if omitted).
  string customer_id = 2 [(google.api.field_behavior) = OPTIONAL];
  // Payment method preference (BKASH, NAGAD, CARD, etc.)
  string payment_method = 3 [(google.api.field_behavior) = OPTIONAL];
  // Extended fields (Phase 2)
  string tenant_id = 4 [(google.api.field_behavior) = OPTIONAL];
  string organisation_id = 5 [(google.api.field_behavior) = OPTIONAL];
  // Client-supplied idempotency key — duplicate requests with same key return existing order.
  string idempotency_key = 6 [(google.api.field_behavior) = OPTIONAL];
  // Total payable amount — sourced from quotation. Caller must supply from quotation lookup.
  insuretech.common.v1.Money total_payable = 7 [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Timestamp coverage_start_at = 8 [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Timestamp coverage_end_at = 9 [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Timestamp payment_due_at = 10 [(google.api.field_behavior) = OPTIONAL];
  // B2B purchase order reference (b2b flow only).
  string purchase_order_id = 11 [(google.api.field_behavior) = OPTIONAL];
  // Product and plan (resolved from quotation — caller may supply to skip re-lookup).
  string product_id = 12 [(google.api.field_behavior) = OPTIONAL];
  string plan_id = 13 [(google.api.field_behavior) = OPTIONAL];
}

message CreateOrderResponse {
  OrderView order = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string message = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── GET ORDER ───────────────────────────────────────────────────────────────

message GetOrderRequest {
  string order_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetOrderResponse {
  OrderView order = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── LIST ORDERS ─────────────────────────────────────────────────────────────

message ListOrdersRequest {
  int32 page_size = 1 [(google.api.field_behavior) = OPTIONAL];
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];
  string customer_id = 3 [(google.api.field_behavior) = OPTIONAL];
  insuretech.orders.entity.v1.OrderStatus status = 4
      [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Timestamp start_date = 5
      [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Timestamp end_date = 6
      [(google.api.field_behavior) = OPTIONAL];
}

message ListOrdersResponse {
  repeated OrderView orders = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  int32 total_count = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── INITIATE PAYMENT ────────────────────────────────────────────────────────

message InitiatePaymentRequest {
  string order_id = 1 [(google.api.field_behavior) = REQUIRED];
  // Payment method: BKASH, NAGAD, ROCKET, CARD, BANK_TRANSFER
  string payment_method = 2 [(google.api.field_behavior) = REQUIRED];
  // Frontend callback URL after payment gateway redirect
  string callback_url = 3 [(google.api.field_behavior) = OPTIONAL];
  // Idempotency key to prevent duplicate payment initiation (CG-3)
  string idempotency_key = 4 [(google.api.field_behavior) = REQUIRED];
}

message InitiatePaymentResponse {
  string order_id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  string payment_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  string payment_url = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  string payment_gateway_ref = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  google.protobuf.Timestamp expires_at = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── CONFIRM PAYMENT ─────────────────────────────────────────────────────────

message ConfirmPaymentRequest {
  string order_id = 1 [(google.api.field_behavior) = REQUIRED];
  string payment_id = 2 [(google.api.field_behavior) = REQUIRED];
  string transaction_id = 3 [(google.api.field_behavior) = REQUIRED];
}

message ConfirmPaymentResponse {
  string order_id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.orders.entity.v1.OrderStatus status = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
  string message = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── CANCEL ORDER ────────────────────────────────────────────────────────────

message CancelOrderRequest {
  string order_id = 1 [(google.api.field_behavior) = REQUIRED];
  string reason = 2 [(google.api.field_behavior) = REQUIRED];
}

message CancelOrderResponse {
  string order_id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.orders.entity.v1.OrderStatus status = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
  string message = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ─── GET ORDER STATUS ────────────────────────────────────────────────────────

message GetOrderStatusRequest {
  string order_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetOrderStatusResponse {
  string order_id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.orders.entity.v1.OrderStatus status = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
  string payment_id = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  string policy_id = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
  insuretech.common.v1.Error error = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];
}
