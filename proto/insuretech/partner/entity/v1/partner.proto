enum PartnerType {
  PARTNER_TYPE_UNSPECIFIED = 0;

  // Life Insurance Partners
  PARTNER_TYPE_HOSPITAL = 1;  // Healthcare provider - Life
  PARTNER_TYPE_PHARMACY = 2;  // Pharmacy/Medicine retailer - Life
  PARTNER_TYPE_DOCTOR = 3;    // Individual doctor - Life
  PARTNER_TYPE_AMBULANCE = 4; // Emergency ambulance service - Life

  // Non-Life Insurance Partners
  PARTNER_TYPE_AUTO_REPAIR = 5;   // Vehicle/Car repair shop - Non-Life
  PARTNER_TYPE_LAPTOP_REPAIR = 6; // Computer/Laptop repair - Non-Life
  PARTNER_TYPE_MOBILE_REPAIR = 7; // Mobile phone repair - Non-Life

  // Other Partners
  PARTNER_TYPE_MFS = 10;           // Mobile Financial Services (bKash, Nagad)
  PARTNER_TYPE_ECOMMERCE = 11;     // Online marketplace
  PARTNER_TYPE_AGENT_NETWORK = 12; // Insurance agent network
  PARTNER_TYPE_CORPORATE = 13;     // Corporate partner (B2B)
}

enum PartnerStatus {
  PARTNER_STATUS_UNSPECIFIED = 0;
  PARTNER_STATUS_PENDING_VERIFICATION = 1; // Awaiting document verification
  PARTNER_STATUS_ACTIVE = 2;               // Active partner
  PARTNER_STATUS_SUSPENDED = 3;            // Temporarily suspended
  PARTNER_STATUS_TERMINATED = 4;           // Contract terminated
}

// Commission structure (embedded in Partner table)
message CommissionStructure {
  double acquisition_rate = 1;       // 15-25%
  double renewal_rate = 2;           // Renewal commission
  double claims_assistance_rate = 3; // Claims assistance fee
}

// Partner Benefits Configuration (Discount & Cashless)
message PartnerBenefits {
  // Discount configuration
  bool discount_enabled = 1;      // Enable/Disable discount
  double discount_percentage = 2; // Discount percentage (0-100)
  double min_discount = 3;        // Minimum discount %
  double max_discount = 4;        // Maximum discount %
  string discount_type = 5;       // SERVICE, PRODUCT, CONSULTATION

  // Cashless configuration
  bool cashless_enabled = 6;               // Enable/Disable cashless
  int64 cashless_limit = 7;                // Maximum cashless amount in paisa
  int64 auto_approval_threshold = 8;       // Auto-approve below this amount
  bool pre_authorization_required = 9;     // Require pre-auth
  int32 authorization_validity_days = 10;  // Pre-auth validity period
  repeated string required_documents = 11; // Documents needed for cashless

  // Service area
  repeated string service_locations = 12; // Cities/areas covered
  bool nationwide_coverage = 13;          // Available nationwide

  // Additional info
  string notes = 14; // Additional notes
  google.protobuf.Timestamp effective_from = 15;
  google.protobuf.Timestamp effective_to = 16;
}

