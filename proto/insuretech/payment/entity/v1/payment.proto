// PaymentRefund for cancelled policies or overpayments (payment transaction record)
// Maps to 'refunds' table in payment_schema
message PaymentRefund {
  option (insuretech.common.v1.table) = {
    table_name: "payment_refunds"
    schema_name: "payment_schema"
    migration_order: 54
    is_table: true
    comment: "Refund requests and processing"
    soft_delete: false
    audit_fields: true
    enable_rls: true
  };

  string refund_id = 1 [
    (insuretech.common.v1.column) = {
      column_name: "refund_id"
      sql_type: "UUID"
      primary_key: true
      not_null: true
      default_value: "gen_random_uuid()"
      comment: "Primary key - Refund UUID"
    }
  ];
  // @inject_tag: gorm:"primaryKey;column:refund_id;not null"

  string payment_id = 2 [
    (insuretech.common.v1.column) = {
      column_name: "payment_id"
      sql_type: "UUID"
      not_null: true
      comment: "Foreign key to payments table (original payment)"
      foreign_key: {
        references_table: "payments"
        references_column: "payment_id"
        references_schema: "payment_schema"
        on_delete: REFERENTIAL_ACTION_RESTRICT
        on_update: REFERENTIAL_ACTION_CASCADE
        constraint_name: "fk_refunds_payment_id"
      }
      index: {
        index_name: "idx_refunds_payment_id"
        index_type: INDEX_TYPE_BTREE
      }
    }
  ];
  // @inject_tag: gorm:"column:payment_id;not null"

  string refund_payment_id = 3 [
    (insuretech.common.v1.column) = {
      column_name: "refund_payment_id"
      sql_type: "UUID"
      comment: "Foreign key to payments table (refund payment record)"
      foreign_key: {
        references_table: "payments"
        references_column: "payment_id"
        references_schema: "payment_schema"
        on_delete: REFERENTIAL_ACTION_SET_NULL
        on_update: REFERENTIAL_ACTION_CASCADE
        constraint_name: "fk_refunds_refund_payment_id"
      }
    }
  ];
  // @inject_tag: gorm:"column:refund_payment_id"

  insuretech.common.v1.Money refund_amount = 4 [
    (insuretech.common.v1.column) = {
      column_name: "refund_amount"
      sql_type: "BIGINT"
      not_null: true
      check_constraint: "refund_amount > 0"
      comment: "Refund amount in paisa"
    }
  ];
  // @inject_tag: gorm:"column:refund_amount;not null"

  string reason = 5 [
    (insuretech.common.v1.column) = {
      column_name: "reason"
      sql_type: "TEXT"
      not_null: true
      comment: "Reason for refund"
    }
  ];
  // @inject_tag: gorm:"column:reason;not null"

  PaymentRefundStatus status = 6 [
    (insuretech.common.v1.column) = {
      column_name: "status"
      sql_type: "VARCHAR(50)"
      not_null: true
      default_value: "'PENDING'"
      comment: "Refund status"
      index: {
        index_name: "idx_refunds_status"
        index_type: INDEX_TYPE_BTREE
      }
    }
  ];
  // @inject_tag: gorm:"column:status;not null;serializer:proto_enum"

  string approved_by = 7 [
    (insuretech.common.v1.column) = {
      column_name: "approved_by"
      sql_type: "UUID"
      comment: "User ID who approved the refund"
      foreign_key: {
        references_table: "users"
        references_column: "user_id"
        references_schema: "authn_schema"
        on_delete: REFERENTIAL_ACTION_SET_NULL
        on_update: REFERENTIAL_ACTION_CASCADE
        constraint_name: "fk_refunds_approved_by"
      }
    }
  ];
  // @inject_tag: gorm:"column:approved_by"

  google.protobuf.Timestamp approved_at = 8 [
    (insuretech.common.v1.column) = {
      column_name: "approved_at"
      sql_type: "TIMESTAMP WITH TIME ZONE"
      comment: "Refund approval timestamp"
    }
  ];
  // @inject_tag: gorm:"column:approved_at;serializer:proto_timestamp"

  google.protobuf.Timestamp processed_at = 9 [
    (insuretech.common.v1.column) = {
      column_name: "processed_at"
      sql_type: "TIMESTAMP WITH TIME ZONE"
      comment: "Refund processing completion timestamp"
    }
  ];
  // @inject_tag: gorm:"column:processed_at;serializer:proto_timestamp"

  google.protobuf.Timestamp created_at = 10 [
    (insuretech.common.v1.column) = {
      column_name: "created_at"
      sql_type: "TIMESTAMP WITH TIME ZONE"
      not_null: true
      default_value: "CURRENT_TIMESTAMP"
      exclude_from_insert: true
      exclude_from_update: true
    }
  ];
  // @inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp updated_at = 11 [
    (insuretech.common.v1.column) = {
      column_name: "updated_at"
      sql_type: "TIMESTAMP WITH TIME ZONE"
      not_null: true
      default_value: "CURRENT_TIMESTAMP"
      exclude_from_insert: true
    }
  ];
  // @inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"
}

enum PaymentRefundStatus {
  PAYMENT_REFUND_STATUS_UNSPECIFIED = 0;
  PAYMENT_REFUND_STATUS_PENDING = 1; // Awaiting approval
  PAYMENT_REFUND_STATUS_APPROVED = 2; // Approved for processing
  PAYMENT_REFUND_STATUS_PROCESSING = 3; // Being processed
  PAYMENT_REFUND_STATUS_COMPLETED = 4; // Refund completed
  PAYMENT_REFUND_STATUS_REJECTED = 5; // Refund rejected
  PAYMENT_REFUND_STATUS_FAILED = 6; // Refund processing failed
}

