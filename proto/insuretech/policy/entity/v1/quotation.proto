syntax = "proto3";

package insuretech.policy.entity.v1;

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/policy/entity/v1;policyv1";
option csharp_namespace = "Insuretech.Policy.Entity.V1";

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/db.proto";
import "insuretech/common/v1/types.proto";

// Quotation represents a B2B or B2C insurance quote request
message Quotation {
  option (insuretech.common.v1.table) = {
    table_name : "quotations"
    schema_name : "insurance_schema"
    migration_order : 93
    is_table : true
    comment : "Insurance Quotation Requests"
    soft_delete : true
    audit_fields : true
    enable_rls : true
  };

  string quotation_id = 1 [ (insuretech.common.v1.column) = {
    column_name : "quotation_id"
    sql_type : "UUID"
    primary_key : true
    not_null : true
    default_value : "gen_random_uuid()"
  } ];
  // @inject_tag: gorm:"primaryKey;column:quotation_id;not null"

  string business_id = 2 [ (insuretech.common.v1.column) = {
    column_name : "business_id"
    sql_type : "UUID"
    comment : "For B2B quotes"
  } ];
  // @inject_tag: gorm:"column:business_id"

  string insurer_name = 3 [ (insuretech.common.v1.column) = {
    column_name : "insurer_name"
    sql_type : "VARCHAR(255)"
  } ];
  // @inject_tag: gorm:"column:insurer_name"

  string plan_id = 4 [
    (insuretech.common.v1.column) = {column_name : "plan_id" sql_type : "UUID"}
  ];
  // @inject_tag: gorm:"column:plan_id"

  insuretech.common.v1.InsuranceType insurance_category = 5
      [ (insuretech.common.v1.column) = {
        column_name : "insurance_category"
        sql_type : "VARCHAR(50)"
      } ];
  // @inject_tag: gorm:"column:insurance_category"

  string department_id = 6 [ (insuretech.common.v1.column) = {
    column_name : "department_id"
    sql_type : "UUID"
  } ];
  // @inject_tag: gorm:"column:department_id"

  int32 employee_no = 7 [ (insuretech.common.v1.column) = {
    column_name : "employee_no"
    sql_type : "INTEGER"
    default_value : "0"
  } ];
  // @inject_tag: gorm:"column:employee_no"

  insuretech.common.v1.Money estimated_premium = 8;
  insuretech.common.v1.Money quoted_amount = 9;

  QuotationStatus status = 10 [ (insuretech.common.v1.column) = {
    column_name : "status"
    sql_type : "VARCHAR(50)"
    not_null : true
    default_value : "'DRAFT'"
  } ];
  // @inject_tag: gorm:"column:status;not null;serializer:proto_enum"

  google.protobuf.Timestamp submission_date = 11
      [ (insuretech.common.v1.column) = {
        column_name : "submission_date"
        sql_type : "TIMESTAMP WITH TIME ZONE"
      } ];
  // @inject_tag: gorm:"column:submission_date;serializer:proto_timestamp"

  google.protobuf.Timestamp valid_until = 12 [ (insuretech.common.v1.column) = {
    column_name : "valid_until"
    sql_type : "TIMESTAMP WITH TIME ZONE"
  } ];
  // @inject_tag: gorm:"column:valid_until;serializer:proto_timestamp"

  google.protobuf.Timestamp created_at = 13 [ (insuretech.common.v1.column) = {
    column_name : "created_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
    exclude_from_update : true
  } ];
  // @inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp updated_at = 14 [ (insuretech.common.v1.column) = {
    column_name : "updated_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
  } ];
  // @inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"

  string quotation_number = 15 [ (insuretech.common.v1.column) = {
    column_name : "quotation_number"
    sql_type : "VARCHAR(50)"
    unique : true
    comment : "Human-readable quotation number (e.g., QUO-2025-001)"
  } ];
  // @inject_tag: gorm:"column:quotation_number"

  string plan_name = 16 [ (insuretech.common.v1.column) = {
    column_name : "plan_name"
    sql_type : "VARCHAR(255)"
    comment : "Plan name for display"
  } ];
  // @inject_tag: gorm:"column:plan_name"

  string created_by_user_id = 17 [ (insuretech.common.v1.column) = {
    column_name : "created_by_user_id"
    sql_type : "UUID"
    comment : "User who created the quotation"
  } ];
  // @inject_tag: gorm:"column:created_by_user_id"

  string approved_by_user_id = 18 [ (insuretech.common.v1.column) = {
    column_name : "approved_by_user_id"
    sql_type : "UUID"
    comment : "User who approved the quotation"
  } ];
  // @inject_tag: gorm:"column:approved_by_user_id"

  google.protobuf.Timestamp approved_at = 19 [ (insuretech.common.v1.column) = {
    column_name : "approved_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    comment : "Approval timestamp"
  } ];
  // @inject_tag: gorm:"column:approved_at;serializer:proto_timestamp"

  string rejection_reason = 20 [ (insuretech.common.v1.column) = {
    column_name : "rejection_reason"
    sql_type : "TEXT"
    comment : "Reason for rejection if status is REJECTED"
  } ];
  // @inject_tag: gorm:"column:rejection_reason"
}

enum QuotationStatus {
  QUOTATION_STATUS_UNSPECIFIED = 0;
  QUOTATION_STATUS_DRAFT = 1;
  QUOTATION_STATUS_SUBMITTED = 2;
  QUOTATION_STATUS_RECEIVED = 3;
  QUOTATION_STATUS_APPROVED = 4;
  QUOTATION_STATUS_REJECTED = 5;
}
