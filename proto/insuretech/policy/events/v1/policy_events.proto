syntax = "proto3";

package insuretech.policy.events.v1;

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/policy/events/v1;policyeventsv1";
option csharp_namespace = "Insuretech.Policy.Events.V1";

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/types.proto";

// Event: Policy created
message PolicyCreatedEvent {
  string event_id = 1;
  string policy_id = 2;
  string policy_number = 3;
  string customer_id = 4;
  string product_id = 5;
  insuretech.common.v1.Money premium_amount = 6;
  insuretech.common.v1.Money sum_insured = 7;
  google.protobuf.Timestamp timestamp = 8;
  string correlation_id = 9; // CG-6: trace across services
}

// Event: Policy issued (after payment)
message PolicyIssuedEvent {
  string event_id = 1;
  string policy_id = 2;
  string policy_number = 3;
  string customer_id = 4;
  google.protobuf.Timestamp issued_at = 5;
  google.protobuf.Timestamp effective_from = 6;
  google.protobuf.Timestamp effective_to = 7;
  string correlation_id = 8; // CG-6: trace across services
}

// Event: Policy renewed
message PolicyRenewedEvent {
  string event_id = 1;
  string old_policy_id = 2;
  string new_policy_id = 3;
  string new_policy_number = 4;
  string customer_id = 5;
  insuretech.common.v1.Money premium_amount = 6;
  google.protobuf.Timestamp timestamp = 7;
  string correlation_id = 8; // CG-6: trace across services
}

// Event: Policy cancelled
message PolicyCancelledEvent {
  string event_id = 1;
  string policy_id = 2;
  string policy_number = 3;
  string customer_id = 4;
  string reason = 5;
  insuretech.common.v1.Money refund_amount = 6;
  google.protobuf.Timestamp timestamp = 7;
  string correlation_id = 8; // CG-6: trace across services
}

// Event: Policy lapsed
message PolicyLapsedEvent {
  string event_id = 1;
  string policy_id = 2;
  string policy_number = 3;
  string customer_id = 4;
  string reason = 5; // "non_payment", "expired"
  google.protobuf.Timestamp timestamp = 6;
  string correlation_id = 7; // CG-6: trace across services
}

