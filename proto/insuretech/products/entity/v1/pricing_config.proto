syntax = "proto3";

package insuretech.products.entity.v1;

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/products/entity/v1;productsv1";
option csharp_namespace = "Insuretech.Products.Entity.V1";

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/db.proto";

// Product pricing configuration
// Maps to 'pricing_configs' table in product_schema
message PricingConfig {
  option (insuretech.common.v1.table) = {
    table_name : "pricing_configs"
    schema_name : "insurance_schema"
    migration_order : 22
    is_table : true
    comment : "Dynamic pricing rules for products (age, location, risk factors)"
    soft_delete : false
    audit_fields : true
    enable_rls : false
  };

  string pricing_config_id = 1 [ (insuretech.common.v1.column) = {
    column_name : "pricing_config_id"
    sql_type : "UUID"
    primary_key : true
    not_null : true
    default_value : "gen_random_uuid()"
    comment : "Primary key - Pricing Config UUID"
  } ];
  // @inject_tag: gorm:"primaryKey;column:pricing_config_id;not null"

  string product_id = 2 [ (insuretech.common.v1.column) = {
    column_name : "product_id"
    sql_type : "UUID"
    not_null : true
    comment : "Foreign key to products table"
    foreign_key : {
      references_table : "products"
      references_column : "product_id"
      references_schema : "insurance_schema"
      on_delete : REFERENTIAL_ACTION_CASCADE
      on_update : REFERENTIAL_ACTION_CASCADE
      constraint_name : "fk_pricing_configs_product_id"
    }
    index : {
      index_name : "idx_pricing_configs_product_id"
      index_type : INDEX_TYPE_BTREE
    }
  } ];
  // @inject_tag: gorm:"column:product_id;not null"

  repeated PricingRule rules = 3 [ (insuretech.common.v1.column) = {
    column_name : "rules"
    sql_type : "JSONB"
    not_null : true
    comment : "Pricing rules as JSON array"
    is_json : true
    index : {
      index_name : "idx_pricing_configs_rules"
      index_type : INDEX_TYPE_GIN
    }
  } ];
  // @inject_tag: gorm:"column:rules;not null;serializer:proto_enum"

  google.protobuf.Timestamp effective_from = 4
      [ (insuretech.common.v1.column) = {
        column_name : "effective_from"
        sql_type : "TIMESTAMP WITH TIME ZONE"
        not_null : true
        comment : "Pricing config effective start date"
      } ];
  // @inject_tag: gorm:"column:effective_from;not null;serializer:proto_timestamp"
  // null;serializer:proto_timestamp"

  google.protobuf.Timestamp effective_to = 5 [ (insuretech.common.v1.column) = {
    column_name : "effective_to"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    comment : "Pricing config effective end date (NULL = indefinite)"
  } ];
  // @inject_tag: gorm:"column:effective_to;serializer:proto_timestamp"

  google.protobuf.Timestamp created_at = 6 [ (insuretech.common.v1.column) = {
    column_name : "created_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
    exclude_from_update : true
  } ];
  // @inject_tag: gorm:"column:created_at;not null;serializer:proto_timestamp"

  google.protobuf.Timestamp updated_at = 7 [ (insuretech.common.v1.column) = {
    column_name : "updated_at"
    sql_type : "TIMESTAMP WITH TIME ZONE"
    not_null : true
    default_value : "CURRENT_TIMESTAMP"
    exclude_from_insert : true
  } ];
  // @inject_tag: gorm:"column:updated_at;not null;serializer:proto_timestamp"
}

// Pricing rule (stored as JSONB in pricing_configs table)
message PricingRule {
  string rule_id = 1;
  string rule_name = 2;
  RuleType type = 3;
  repeated RuleCondition conditions = 4;
  RuleAction action = 5;
}

enum RuleType {
  RULE_TYPE_UNSPECIFIED = 0;
  RULE_TYPE_AGE_BASED = 1;        // Age-based pricing
  RULE_TYPE_LOCATION_BASED = 2;   // Location/district-based
  RULE_TYPE_OCCUPATION_BASED = 3; // Occupation risk
  RULE_TYPE_VEHICLE_TYPE = 4;     // Vehicle make/model
  RULE_TYPE_HEALTH_CONDITION = 5; // Pre-existing conditions
}

message RuleCondition {
  string field = 1;    // e.g., "age", "district", "vehicle_type"
  string operator = 2; // e.g., ">=", "<=", "in", "not_in"
  string value = 3;    // Comparison value
}

message RuleAction {
  ActionType type = 1;
  double value = 2; // Percentage or fixed amount
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  ACTION_TYPE_INCREASE_PERCENTAGE = 1; // Increase premium by %
  ACTION_TYPE_DECREASE_PERCENTAGE = 2; // Decrease premium by %
  ACTION_TYPE_FIXED_AMOUNT = 3;        // Add fixed amount
  ACTION_TYPE_REJECT = 4;              // Reject application
}
