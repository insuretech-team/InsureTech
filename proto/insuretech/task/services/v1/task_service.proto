syntax = "proto3";

package insuretech.task.services.v1;

import "google/api/annotations.proto";
import "insuretech/common/v1/error.proto";
import "insuretech/task/entity/v1/task.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/task/services/v1;taskservicev1";
option csharp_namespace = "Insuretech.Task.Services.V1";

service TaskService {
  // Create task
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse) {
    option (google.api.http) = {
      post: "/v1/tasks"
      body: "*"
    };
  }
  
  // Get task
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/v1/tasks/{task_id}"
    };
  }
  
  // List my tasks
  rpc ListMyTasks(ListMyTasksRequest) returns (ListMyTasksResponse) {
    option (google.api.http) = {
      get: "/v1/tasks/my-tasks"
    };
  }
  
  // Update task
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse) {
    option (google.api.http) = {
      patch: "/v1/tasks/{task_id}"
      body: "*"
    };
  }
  
  // Assign task
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse) {
    option (google.api.http) = {
      post: "/v1/tasks/{task_id}?action=assign"
      body: "*"
    };
  }
  
  // Complete task
  rpc CompleteTask(CompleteTaskRequest) returns (CompleteTaskResponse) {
    option (google.api.http) = {
      post: "/v1/tasks/{task_id}?action=complete"
      body: "*"
    };
  }
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string type = 3;
  string priority = 4;
  string assigned_to = 5;
  string related_entity_type = 6;
  string related_entity_id = 7;
  string due_date = 8;
}

message CreateTaskResponse {
  string task_id = 1;
  string message = 2;
  // Error information if operation failed
  insuretech.common.v1.Error error = 3;
}

message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  entity.v1.Task task = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

message ListMyTasksRequest {
  string status = 1;
  string priority = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListMyTasksResponse {
  repeated entity.v1.Task tasks = 1;
  int32 total_count = 2;
  // Error information if operation failed
  insuretech.common.v1.Error error = 3;
}

message UpdateTaskRequest {
  string task_id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string priority = 5;
  string due_date = 6;
}

message UpdateTaskResponse {
  string message = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

message AssignTaskRequest {
  string task_id = 1;
  string assigned_to = 2;
}

message AssignTaskResponse {
  string message = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

message CompleteTaskRequest {
  string task_id = 1;
  string comments = 2;
}

message CompleteTaskResponse {
  string message = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

