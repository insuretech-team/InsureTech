syntax = "proto3";

package insuretech.tenant.events.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/tenant/events/v1;tenanteventsv1";

// Kafka event: Tenant created
message TenantCreatedEvent {
  string event_id = 1;
  string tenant_id = 2;
  string tenant_code = 3;
  string tenant_name = 4;
  string type = 5;
  string correlation_id = 6;
  google.protobuf.Timestamp timestamp = 7;
}

// Kafka event: Tenant status changed
message TenantStatusChangedEvent {
  string event_id = 1;
  string tenant_id = 2;
  string old_status = 3;
  string new_status = 4;
  string correlation_id = 5;
  google.protobuf.Timestamp timestamp = 6;
}

