syntax = "proto3";

package insuretech.tenant.services.v1;

import "google/api/annotations.proto";
import "insuretech/common/v1/error.proto";
import "insuretech/tenant/entity/v1/tenant.proto";
import "insuretech/tenant/entity/v1/tenant_config.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/tenant/services/v1;tenantservicev1";
option csharp_namespace = "Insuretech.Tenant.Services.V1";

service TenantService {
  // Create tenant
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse) {
    option (google.api.http) = {
      post: "/v1/tenants"
      body: "*"
    };
  }
  
  // Get tenant
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse) {
    option (google.api.http) = {
      get: "/v1/tenants/{tenant_id}"
    };
  }
  
  // List tenants
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse) {
    option (google.api.http) = {
      get: "/v1/tenants"
    };
  }
  
  // Update tenant
  rpc UpdateTenant(UpdateTenantRequest) returns (UpdateTenantResponse) {
    option (google.api.http) = {
      patch: "/v1/tenants/{tenant_id}"
      body: "*"
    };
  }
  
  // Get tenant config
  rpc GetTenantConfig(GetTenantConfigRequest) returns (GetTenantConfigResponse) {
    option (google.api.http) = {
      get: "/v1/tenants/{tenant_id}/config"
    };
  }
  
  // Update tenant config
  rpc UpdateTenantConfig(UpdateTenantConfigRequest) returns (UpdateTenantConfigResponse) {
    option (google.api.http) = {
      put: "/v1/tenants/{tenant_id}/config"
      body: "*"
    };
  }
}

message CreateTenantRequest {
  string code = 1;
  string name = 2;
  string type = 3;
  string parent_tenant_id = 4;
  string config = 5; // JSON
  string branding = 6; // JSON
}

message CreateTenantResponse {
  string tenant_id = 1;
  string message = 2;
  // Error information if operation failed
  insuretech.common.v1.Error error = 3;
}

message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  entity.v1.Tenant tenant = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

message ListTenantsRequest {
  string type = 1;
  string status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListTenantsResponse {
  repeated entity.v1.Tenant tenants = 1;
  int32 total_count = 2;
  // Error information if operation failed
  insuretech.common.v1.Error error = 3;
}

message UpdateTenantRequest {
  string tenant_id = 1;
  string name = 2;
  string status = 3;
  string config = 4; // JSON
  string branding = 5; // JSON
}

message UpdateTenantResponse {
  string message = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

message GetTenantConfigRequest {
  string tenant_id = 1;
}

message GetTenantConfigResponse {
  repeated entity.v1.TenantConfig configs = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

message UpdateTenantConfigRequest {
  string tenant_id = 1;
  string config_key = 2;
  string config_value = 3;
  string type = 4;
}

message UpdateTenantConfigResponse {
  string message = 1;
  // Error information if operation failed
  insuretech.common.v1.Error error = 2;
}

