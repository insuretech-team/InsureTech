syntax = "proto3";

package insuretech.webrtc.v1.service;

option go_package = "github.com/newage-saint/InsureTech/gen/go/insuretech/webrtc/v1/service;service";

import "google/protobuf/timestamp.proto";
import "insuretech/common/v1/types.proto";
import "insuretech/webrtc/v1/entity/signal.proto";
import "insuretech/webrtc/v1/events/peer_events.proto";
import "insuretech/webrtc/v1/events/track_events.proto";
import "insuretech/webrtc/v1/events/signal_events.proto";

// ═══════════════════════════════════════════════════════════════════════════
// Signaling Service - WebRTC Signaling
// ═══════════════════════════════════════════════════════════════════════════

service SignalingService {
  rpc Connect(stream SignalRequest) returns (stream SignalResponse);
  rpc SendOffer(SendOfferRequest) returns (SendOfferResponse);
  rpc SendAnswer(SendAnswerRequest) returns (SendAnswerResponse);
  rpc SendICECandidate(SendICECandidateRequest) returns (SendICECandidateResponse);
}

message SignalRequest {
 string peer_id = 1;
 string room_id = 2;
  
  oneof payload {
    SendOfferRequest offer = 10;
    SendAnswerRequest answer = 11;
    SendICECandidateRequest ice_candidate = 12;
    PingRequest ping = 13;
  }
}

message SignalResponse {
 string peer_id = 1;
 string room_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  
  oneof payload {
   insuretech.webrtc.v1.events.OfferReceivedEvent offer_received = 10;
   insuretech.webrtc.v1.events.AnswerReceivedEvent answer_received = 11;
   insuretech.webrtc.v1.events.ICECandidateReceivedEvent ice_candidate_received = 12;
   insuretech.webrtc.v1.events.RenegotiationRequiredEvent renegotiation_required = 13;
    
   insuretech.webrtc.v1.events.PeerJoinedEvent peer_joined = 20;
   insuretech.webrtc.v1.events.PeerLeftEvent peer_left = 21;
   insuretech.webrtc.v1.events.PeerStateChangedEvent peer_state_changed = 22;
    
   insuretech.webrtc.v1.events.TrackPublishedEvent track_published = 30;
   insuretech.webrtc.v1.events.TrackUnpublishedEvent track_unpublished = 31;
   insuretech.webrtc.v1.events.TrackMutedEvent track_muted = 32;
    
    ErrorResponse error = 40;
    PongResponse pong = 41;
  }
}

message SendOfferRequest {
 string from_peer_id = 1;
 string to_peer_id = 2;
  string sdp = 3;
}

message SendOfferResponse {
  bool success = 1;
}

message SendAnswerRequest {
 string from_peer_id = 1;
 string to_peer_id = 2;
  string sdp = 3;
}

message SendAnswerResponse {
  bool success = 1;
}

message SendICECandidateRequest {
 string from_peer_id = 1;
 string to_peer_id = 2;
  string candidate = 3;
  string sdp_mid = 4;
  int32 sdp_m_line_index = 5;
}

message SendICECandidateResponse {
  bool success = 1;
}

message PingRequest {
  google.protobuf.Timestamp timestamp = 1;
}

message PongResponse {
  google.protobuf.Timestamp timestamp = 1;
}

message ErrorResponse {
  ErrorCode code = 1;
  string message = 2;
  map<string, string> details = 3;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_ROOM_NOT_FOUND = 1;
  ERROR_CODE_ROOM_FULL = 2;
  ERROR_CODE_INVALID_TOKEN = 3;
  ERROR_CODE_PEER_NOT_FOUND = 4;
  ERROR_CODE_CONNECTION_FAILED = 5;
  ERROR_CODE_INVALID_SDP = 6;
  ERROR_CODE_MEDIA_ERROR = 7;
  ERROR_CODE_PERMISSION_DENIED = 8;
  ERROR_CODE_INTERNAL_ERROR = 9;
}

