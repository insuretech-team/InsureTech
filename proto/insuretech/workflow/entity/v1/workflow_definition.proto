syntax = "proto3";

package insuretech.workflow.entity.v1;


import "insuretech/common/v1/types.proto";
import "insuretech/common/v1/db.proto";

option go_package = "github.com/newage-saint/insuretech/gen/go/insuretech/workflow/entity/v1;workflowv1";

// Workflow definition (FR-218, FR-219)
message WorkflowDefinition {
  option (insuretech.common.v1.table) = {
    table_name: "workflow_definitions"
    schema_name: "workflow_schema"
    migration_order: 59
    is_table: true
    audit_fields: true
    comment: "Reusable workflow templates for approvals and processes"
  };
  
  string workflow_definition_id = 1 [(insuretech.common.v1.column) = {
    column_name: "workflow_definition_id"
    sql_type: "UUID"
    primary_key: true
    not_null: true
    default_value: "gen_random_uuid()"
  }];
  // @inject_tag: gorm:"primaryKey;column:workflow_definition_id;not null"
  
  string name = 2 [(insuretech.common.v1.column) = {
    column_name: "name"
    sql_type: "VARCHAR(255)"
    not_null: true
    unique: true
    index: {
      index_name: "idx_workflow_definitions_name"
      index_type: INDEX_TYPE_BTREE
      unique: true
    }
  }];
  // @inject_tag: gorm:"column:name;not null"
  
  string description = 3 [(insuretech.common.v1.column) = {
    column_name: "description"
    sql_type: "TEXT"
  }];
  // @inject_tag: gorm:"column:description"
  
  WorkflowType type = 4 [(insuretech.common.v1.column) = {
    column_name: "type"
    sql_type: "VARCHAR(50)"
    not_null: true
    index: {
      index_name: "idx_workflow_definitions_type"
      index_type: INDEX_TYPE_BTREE
    }
  }];
  // @inject_tag: gorm:"column:type;not null;serializer:proto_enum"
  
  string entity_type = 5 [(insuretech.common.v1.column) = {
    column_name: "entity_type"
    sql_type: "VARCHAR(50)"
    not_null: true
    comment: "CLAIM, POLICY, UNDERWRITING, ENDORSEMENT, REFUND"
  }];
  // @inject_tag: gorm:"column:entity_type;not null"
  
  string steps = 6 [(insuretech.common.v1.column) = {
    column_name: "steps"
    sql_type: "JSONB"
    is_json: true
    not_null: true
    comment: "Workflow steps configuration"
  }];
  // @inject_tag: gorm:"column:steps;not null"
  
  string conditions = 7 [(insuretech.common.v1.column) = {
    column_name: "conditions"
    sql_type: "JSONB"
    is_json: true
    comment: "Conditional logic for workflow routing"
  }];
  // @inject_tag: gorm:"column:conditions"
  
  int32 version = 8 [(insuretech.common.v1.column) = {
    column_name: "version"
    sql_type: "INTEGER"
    not_null: true
    default_value: "1"
  }];
  // @inject_tag: gorm:"column:version;not null"
  
  WorkflowStatus status = 9 [(insuretech.common.v1.column) = {
    column_name: "status"
    sql_type: "VARCHAR(20)"
    not_null: true
    default_value: "'ACTIVE'"
  }];
  // @inject_tag: gorm:"column:status;not null;serializer:proto_enum"
  
  insuretech.common.v1.AuditInfo audit_info = 10 [
    (insuretech.common.v1.column) = {
      column_name: "audit_info"
      sql_type: "JSONB"
      not_null: true
      default_value: "'{}'::jsonb"
      is_json: true
      comment: "Audit trail stored as JSON"
    }
  ];
  // @inject_tag: gorm:"column:audit_info;not null"
}

enum WorkflowType {
  WORKFLOW_TYPE_UNSPECIFIED = 0;
  WORKFLOW_TYPE_APPROVAL = 1;
  WORKFLOW_TYPE_REVIEW = 2;
  WORKFLOW_TYPE_ESCALATION = 3;
  WORKFLOW_TYPE_NOTIFICATION = 4;
}

enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  WORKFLOW_STATUS_DRAFT = 1;
  WORKFLOW_STATUS_ACTIVE = 2;
  WORKFLOW_STATUS_INACTIVE = 3;
  WORKFLOW_STATUS_ARCHIVED = 4;
}

