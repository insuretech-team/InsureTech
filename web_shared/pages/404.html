<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Labaid InsureTech</title>
    <style>
        :root {
            --primary-color: #03A765;
            --bg-color: #123F50;
            --text-color: #F8FAFC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at 80% 20%, #1a5c75 0%, var(--bg-color) 100%);
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #03A765 0%, #A8A9AD 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            animation: glitch 2s linear infinite;
            position: relative;
        }

        .logo {
            max-width: 150px;
            margin-bottom: 2rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .logo:hover {
            opacity: 1;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e2e8f0;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            max-width: 500px;
        }

        .home-btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            font-weight: 600;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @keyframes glitch {

            2%,
            64% {
                transform: translate(2px, 0) skew(0deg);
            }

            4%,
            60% {
                transform: translate(-2px, 0) skew(0deg);
            }

            62% {
                transform: translate(0, 0) skew(5deg);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <img src="/static/logo_transparent.png" alt="Labaid InsureTech" class="logo">
        <div class="error-code">404</div>
        <h2>Lost in cyberspace</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="/" class="home-btn">Return Home</a>
    </div>
</body>

</html>
