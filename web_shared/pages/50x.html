<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | Labaid InsureTech</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at 50% 10%, #334155 0%, #0f172a 80%);
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            max-width: 150px;
            margin-bottom: 2rem;
            filter: grayscale(100%) opacity(0.7);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #ef4444;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .action-btn {
            padding: 0.75rem 2rem;
            background: transparent;
            color: #f8fafc;
            border: 2px solid #475569;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #475569;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <img src="/static/logo_transparent.png" alt="Labaid" class="logo">
        <div class="error-code">500</div>
        <h2>System Down for Maintenance</h2>
        <p>Our servers are currently experiencing an unexpected issue or undergoing scheduled maintenance. We're working
            hard to get everything back online.</p>
        <button class="action-btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>

</html>
