<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Labaid InsureTech</title>
    <style>
        :root {
            --primary-color: #0E7490;
            /* A rich teal/cyan, will adjust based on logo_color.md */
            --bg-color: #0B1120;
            --text-color: #F8FAFC;
            --accent-color: #22D3EE;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #172554 0%, #0B1120 100%);
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            max-width: 800px;
        }

        .logo-container {
            margin-bottom: 2rem;
            animation: fadeInDown 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo {
            max-width: 250px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.3));
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.3s both;
        }

        p {
            font-size: 1.25rem;
            color: #94A3B8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            animation: fadeIn 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.6s both;
        }

        .decorative-blob {
            position: absolute;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(14, 116, 144, 0.4) 0%, rgba(11, 17, 32, 0) 70%);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.3) 0%, rgba(11, 17, 32, 0) 70%);
            animation-delay: -5s;
        }

        .contact-btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: #0B1120;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--primary-color) 100%);
            border-radius: 9999px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3);
            animation: fadeInUp 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.9s both;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 211, 238, 0.4);
            filter: brightness(1.1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(5%, 5%) scale(1.05);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1.125rem;
            }

            .logo {
                max-width: 200px;
            }
        }
    </style>
    <!-- Add Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="decorative-blob blob-1"></div>
    <div class="decorative-blob blob-2"></div>

    <div class="container">
        <div class="logo-container">
            <!-- Base64 string will be injected or an absolute path depending on how we handle static assets -->
            <!-- Using SVG or transparent PNG -->
            <img src="/static/logo_transparent.png" alt="Labaid InsureTech Logo" class="logo" id="main-logo">
        </div>

        <h1>Something Extraordinary is Coming</h1>
        <p>We are building the next generation of intelligent insurance solutions. Our portal is currently undergoing
            significant upgrades to bring you an unparalleled experience.</p>

        <a href="mailto:contact@labaidinsuretech.com" class="contact-btn">Contact Us</a>
    </div>
</body>

</html>
